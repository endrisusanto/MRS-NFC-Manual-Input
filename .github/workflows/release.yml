name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Build APK
        run: npm run android:debug

      - name: Collect APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist/mers-remote-${{ github.ref_name }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mers-remote-apk-${{ github.ref_name }}
          path: dist/*.apk

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS
        run: npm run dist:win

      - name: Collect artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe dist/
          Compress-Archive -Path manifest.json,bridge.js,content.css,content.js,help.html,popup.html,popup.js,icons -DestinationPath "dist/mers-nfc-tauri-extension-${{ github.ref_name }}.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mers-nfc-windows-${{ github.ref_name }}
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs:
      - android
      - windows

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mers-nfc-${{ github.ref_name }}
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
