name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Build APK
        run: npm run android:debug

      - name: Collect APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist/mers-remote-${{ github.ref_name }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mers-remote-apk-${{ github.ref_name }}
          path: dist/*.apk

  windows:
    runs-on: windows-latest
    env:
      CARGO_HTTP_MULTIPLEXING: false
      CARGO_NET_RETRY: 10
      RUSTUP_MAX_RETRIES: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: powershell
        run: |
          git config --global http.version HTTP/1.1
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000
          npm ci

      - name: Add WiX to PATH
        shell: powershell
        run: |
          $wix = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($wix) { echo $wix.FullName | Out-File -Append -FilePath $env:GITHUB_PATH }
          else { choco install wixtoolset -y --no-progress }

      - name: Build MSI
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          for ($i = 1; $i -le 3; $i++) {
            try {
              npm run dist:win
              break
            } catch {
              if ($i -eq 3) { throw }
              Start-Sleep -Seconds (20 * $i)
            }
          }

      - name: Collect artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item src-tauri/target/release/bundle/msi/*.msi dist/
          Compress-Archive -Path manifest.json,bridge.js,content.css,content.js,help.html,popup.html,popup.js,icons -DestinationPath "dist/mers-nfc-tauri-extension-${{ github.ref_name }}.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mers-nfc-windows-${{ github.ref_name }}
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs:
      - android
      - windows

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mers-nfc-${{ github.ref_name }}
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
