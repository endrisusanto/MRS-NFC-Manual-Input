<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MeRS NFC Desktop</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap');
      
      * {
        box-sizing: border-box;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      :root {
        --bg-dark: #080c14;
        --bg-radial: radial-gradient(circle at top, #0f1c30 0%, #06090e 70%);
        --card-bg: rgba(13, 22, 38, 0.7);
        --border-glow: rgba(255, 255, 255, 0.15);
        --text-color: #f3f4f6;
        --font-sans: 'Outfit', sans-serif;
        --font-mono: 'Fira Code', monospace;
      }
      
      html, body {
        margin: 0;
        min-height: 100%;
        background-color: var(--bg-dark);
        background-image: var(--bg-radial);
        color: var(--text-color);
        font-family: var(--font-sans);
        overflow-x: hidden;
      }
      
      body {
        min-height: 100svh;
        padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        display: grid;
        place-items: center;
      }
      
      .panel {
        width: 100%;
        max-width: 600px;
        min-height: calc(100svh - 32px);
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 16px;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        background: var(--card-bg);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      
      h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #f5f5f5, #a3a3a3);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
      }
      
      p {
        margin: 0 0 16px;
        color: #9ca3af;
        text-align: center;
        font-size: 14px;
        line-height: 1.5;
      }
      
      .badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 10px;
      }
      
      .pill {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: #e5e7eb;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      
      button.pill {
        cursor: pointer;
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        color: #f5f5f5;
      }
      
      button.pill:hover {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
      }
      
      .pill.ok {
        color: #f5f5f5;
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
      }
      
      .pill.bad {
        color: #f87171;
        border-color: rgba(248, 113, 113, 0.2);
        background: rgba(248, 113, 113, 0.08);
        box-shadow: 0 0 10px rgba(248, 113, 113, 0.05);
      }
      
      .pill.warn {
        color: #fbbf24;
        border-color: rgba(251, 191, 36, 0.2);
        background: rgba(251, 191, 36, 0.08);
        box-shadow: 0 0 10px rgba(251, 191, 36, 0.05);
      }
      
      .card {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 20px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(255, 255, 255, 0.02);
        min-height: 124px;
        text-align: left;
      }
      
      .card strong {
        display: block;
        font-size: 22px;
        margin-bottom: 8px;
        color: #f5f5f5;
      }
      
      .card span {
        color: #9ca3af;
        font-size: 14px;
        line-height: 1.45;
      }
      
      input {
        display: block;
        width: 100%;
        height: 52px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.3);
        color: #fff;
        padding: 0 16px;
        outline: none;
        font-family: var(--font-mono);
        font-size: 22px;
        font-weight: 600;
        text-align: center;
        letter-spacing: 2px;
        margin-bottom: 16px;
      }
      
      input:focus {
        border-color: #f5f5f5;
        background: rgba(0, 0, 0, 0.45);
        box-shadow: 0 0 14px rgba(255, 255, 255, 0.15);
      }
      
      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      
      button {
        min-height: 50px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: #e5e7eb;
        font-family: var(--font-sans);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      
      button:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-1px);
      }
      
      button:active {
        transform: translateY(1px);
      }
      
      .tap {
        display: none;
      }
      
      body[data-step="tap"] .home {
        display: none;
      }
      
      body[data-step="tap"] .tap {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      
      .result {
        display: none;
        flex-direction: column;
        gap: 14px;
      }
      
      body[data-step="result"] .home,
      body[data-step="result"] .tap {
        display: none;
      }
      
      body[data-step="result"] .result {
        display: flex;
      }
      
      .selected {
        margin: 0 0 10px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.06);
        text-align: center;
        font-size: 13px;
        color: #9ca3af;
      }
      
      .selected b {
        display: block;
        margin-top: 4px;
        font-family: var(--font-mono);
        font-size: 24px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 1px;
      }
      
      .lokets {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      
      .loket {
        height: 64px;
        font-size: 20px;
        font-weight: 800;
        border-color: rgba(255, 255, 255, 0.08);
      }
      
      .back {
        margin-top: 10px;
        height: 44px;
        padding: 0 14px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
      }
      
      .hint {
        min-height: 20px;
        margin-top: 10px;
        color: #f5f5f5;
        text-align: center;
        font-weight: 700;
        font-size: 13px;
      }
      
      .server-btn {
        display: block;
        width: 120px;
        height: 38px;
        margin: 0 auto 16px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.03);
      }
      
      .summary {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 10px;
      }
      
      .order-strip {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      
      .order-strip.single {
        grid-template-columns: 1fr;
      }
      
      .order-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-content: start;
        min-width: 0;
      }
      
      .item {
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .item h2 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 800;
        color: #f5f5f5;
      }
      
      .meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        color: #9ca3af;
        font-size: 12px;
      }
      
      .meta b {
        display: block;
        color: #fff;
        font-size: 14px;
        margin-top: 2px;
        overflow-wrap: anywhere;
      }
      
      .status {
        text-align: center;
        font-size: 16px;
        font-weight: 800;
        padding: 14px;
        border-radius: 14px;
      }
      
      .status-ok {
        color: #f5f5f5;
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.06);
      }
      
      .status-warn {
        color: #fbbf24;
        border-color: rgba(251, 191, 36, 0.2);
        background: rgba(251, 191, 36, 0.06);
      }
      
      .status-danger {
        color: #f87171;
        border-color: rgba(248, 113, 113, 0.2);
        background: rgba(248, 113, 113, 0.06);
      }
      
      .wrong {
        border-color: rgba(248, 113, 113, 0.2);
        background: rgba(248, 113, 113, 0.06);
        color: #f87171;
      }
      
      .bento-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      
      .bento-head h2 {
        margin: 0;
        font-size: 16px;
        font-weight: 800;
        color: #fff;
      }
      
      .portion {
        padding: 6px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
        color: #fbbf24;
      }
      
      .bento {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }
      
      .bento-card {
        min-height: 72px;
        padding: 10px;
        border: 1px solid var(--line);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      
      .bento-label {
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      
      .bento-name {
        margin-top: 5px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.3;
        overflow-wrap: anywhere;
        color: var(--text);
      }
      
      details {
        margin-top: 8px;
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      
      summary {
        padding: 12px 16px;
        cursor: pointer;
        font-weight: 700;
        color: #f5f5f5;
      }
      
      pre {
        max-height: 170px;
        overflow: auto;
        margin: 0;
        padding: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(0, 0, 0, 0.4);
        white-space: pre-wrap;
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1.5;
        color: #a7f3d0;
      }
      
      .modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        animation: fadeIn 0.2s ease-out;
      }
      
      .modal[hidden] {
        display: none;
      }
      
      .modal form {
        width: min(460px, 100%);
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: #0d1424;
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
        animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      
      .modal label {
        display: block;
        margin-bottom: 6px;
        color: #f5f5f5;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      
      .modal input {
        width: 100%;
        max-width: none;
        margin-bottom: 16px;
        text-align: left;
        font-size: 16px;
        font-family: var(--font-sans);
        letter-spacing: normal;
        height: 52px;
      }
      
      .modal-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      
      .modal-actions button {
        height: 48px;
        border-radius: 14px;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      
      @media (max-width: 980px) {
        .order-strip {
          display: flex;
          overflow-x: auto;
          scroll-snap-type: x mandatory;
          padding-bottom: 8px;
        }
        .order-card {
          flex: 0 0 min(92%, 620px);
          scroll-snap-align: center;
        }
      }
      
      @media (max-width: 860px) {
        .bento {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
      
      @media (max-width: 680px) {
        body { padding: 4px; }
        .panel { padding: 18px; }
        .cards, .lokets, .meta { grid-template-columns: 1fr; }
        .bento { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      
      @media (orientation: landscape) and (max-height: 720px) {
        .panel { padding: 12px; }
        h1 { font-size: 20px; }
        p { margin-bottom: 10px; }
        input { height: 44px; margin-bottom: 10px; font-size: 21px; }
        .card { min-height: 96px; padding: 14px; }
        .selected { padding: 8px; margin-bottom: 8px; }
        .selected b { font-size: 22px; }
        .loket { height: 52px; font-size: 18px; }
        .bento-card { min-height: 58px; padding: 8px; }
        .bento-name { font-size: 12px; }
      }

      :root {
        --page: #f4f4f2;
        --surface: #fff;
        --text: #111;
        --muted: #555;
        --line: #111;
        --primary: #111;
        --primary-text: #fff;
        --hover: #eee;
        --danger: #9f1239;
        --warn: #854d0e;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --page: #080808;
          --surface: #111;
          --text: #f5f5f5;
          --muted: #bdbdbd;
          --line: #f5f5f5;
          --primary: #f5f5f5;
          --primary-text: #080808;
          --hover: #1f1f1f;
          --danger: #fda4af;
          --warn: #fcd34d;
        }
      }
      * { transition: none; }
      html,
      body {
        background: var(--page);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        padding: 0;
      }
      .panel {
        width: 100%;
        max-width: none;
        min-height: 100svh;
        padding: clamp(18px, 4vw, 42px);
        border: 0;
        border-radius: 0;
        background: var(--page);
        color: var(--text);
        box-shadow: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }
      h1 {
        color: var(--text);
        background: none;
        -webkit-text-fill-color: currentColor;
        letter-spacing: .02em;
        text-transform: uppercase;
      }
      p,
      .card span,
      .selected,
      .meta,
      .bento-label {
        color: var(--muted);
      }
      input,
      button,
      .card,
      .item,
      .selected,
      .portion,
      .bento-card,
      details,
      .pill,
      .modal form,
      pre {
        border: 1px solid var(--line);
        border-radius: 0;
        background: var(--surface);
        color: var(--text);
        box-shadow: none;
      }
      input {
        height: 62px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: clamp(24px, 6vw, 40px);
      }
      input:focus {
        border-color: var(--line);
        outline: 3px solid var(--line);
        outline-offset: 3px;
        background: var(--surface);
        box-shadow: none;
      }
      button:hover,
      button.pill:hover {
        transform: none;
        border-color: var(--line);
        background: var(--hover);
        box-shadow: none;
      }
      .server-btn,
      .back,
      .loket,
      .modal-actions button,
      #tap,
      #cek {
        border-radius: 0;
      }
      .card strong,
      .item h2,
      summary,
      .modal label,
      .hint,
      .pill.ok,
      button.pill,
      .selected b,
      .meta b,
      .bento-head h2,
      .bento-name {
        color: var(--text);
      }
      .status-ok,
      .status-warn,
      .status-danger,
      .wrong,
      .pill.ok,
      .pill.warn,
      .pill.bad {
        border-color: var(--line);
        background: var(--surface);
        color: var(--text);
      }
      .status-danger,
      .wrong,
      .pill.bad {
        color: var(--danger);
      }
      .status-warn,
      .pill.warn,
      .portion {
        color: var(--warn);
      }
      .modal {
        background: color-mix(in srgb, var(--page) 92%, transparent);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        animation: none;
      }
      .modal form {
        animation: none;
      }
      @media (min-width: 900px) {
        .panel {
          align-content: center;
        }
        .badges {
          grid-column: 1 / -1;
        }
        .home,
        .tap {
          align-self: center;
        }
        .result {
          grid-column: 1 / -1;
        }
      }
      body[data-step="home"] .panel,
      body[data-step="tap"] .panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .home,
      .tap {
        width: min(520px, 100%);
      }
      .result {
        width: min(1180px, 100%);
        margin: 0 auto;
      }

      .pill.ok {
        border-color: #86efac;
        background: #dcfce7;
        color: #14532d;
      }
      .pill.warn {
        border-color: #fde68a;
        background: #fef3c7;
        color: #713f12;
      }
      .pill.bad {
        border-color: #fecdd3;
        background: #ffe4e6;
        color: #881337;
      }
      @media (prefers-color-scheme: dark) {
        .pill.ok {
          border-color: #4ade80;
          background: #14291c;
          color: #bbf7d0;
        }
        .pill.warn {
          border-color: #facc15;
          background: #2d240f;
          color: #fde68a;
        }
        .pill.bad {
          border-color: #fb7185;
          background: #32161c;
          color: #fecdd3;
        }
      }
    </style>
  </head>
  <body data-step="home">
    <main class="panel">
      <div class="badges">
        <span id="app-status" class="pill warn">app...</span>
        <span id="bridge-status" class="pill warn">bridge...</span>
        <span id="mers-status" class="pill warn">mers...</span>
        <span id="gateway-status" class="pill warn">gateway...</span>
      </div>
      <section class="home">
        <h1>MeRS Desktop</h1>
        <p>Masukkan GEN 8 digit atau ID kartu 10 digit yang akan dieksekusi.</p>
        <button class="server-btn" id="settings">Server</button>
        <input id="uid" inputmode="numeric" maxlength="10" autocomplete="off" autofocus>
        <div class="cards">
          <button class="card" id="tap"><strong>Tap In Scanner</strong><span>Masuk ke pilihan loket untuk ID ini.</span></button>
          <button class="card" id="cek"><strong>Cek Menu Pesanan</strong><span>Langsung tampilkan detail pesanan ID ini.</span></button>
        </div>
      </section>
      <section class="tap">
        <h1>Tap In Scanner</h1>
        <div class="selected">ID yang akan dieksekusi<b id="selected"></b></div>
        <div class="lokets">
          <button class="loket" data-loket="1">Loket 1</button>
          <button class="loket" data-loket="2">Loket 2</button>
          <button class="loket" data-loket="3">Loket 3</button>
          <button class="loket" data-loket="4">Loket 4</button>
          <button class="loket" data-loket="5">Loket 5</button>
          <button class="loket" data-loket="6">Loket 6</button>
        </div>
        <button class="back" id="back">Kembali</button>
      </section>
      <div class="hint" id="hint"></div>
    </main>

    <div id="result-modal" class="modal" hidden>
      <section class="result" style="width: min(800px, 100%); max-height: 90vh; overflow: auto; padding: 28px; border: 1px solid var(--line); background: var(--surface); color: var(--text);">
        <h1 id="result-title" style="text-align: center;">Detail</h1>
        <div class="selected" style="margin-bottom: 12px;">ID<b id="result-id"></b></div>
        <div id="result-summary" class="summary"></div>
        <details id="api-details">
          <summary>API Response</summary>
          <pre id="result-body"></pre>
        </details>
        <button class="back" id="home" style="margin-top: 14px; width: 100%;">Beranda</button>
      </section>
    </div>
    <div id="config" class="modal" hidden>
      <form>
        <label for="server-url">URL Server MeRS</label>
        <input id="server-url" placeholder="http://107.102.8.148/MERS">
        
        <label for="gateway-url">URL Gateway WebSocket</label>
        <input id="gateway-url" placeholder="wss://makan.endrisusanto.my.id">
        <div class="presets" style="margin-top: -6px; margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap;">
          <button type="button" class="pill" id="preset-prod" style="min-height: auto; padding: 4px 8px; font-size: 11px; margin: 0;">Cloud</button>
          <button type="button" class="pill" id="preset-local3" style="min-height: auto; padding: 4px 8px; font-size: 11px; margin: 0;">Local 3000</button>
          <button type="button" class="pill" id="preset-local5" style="min-height: auto; padding: 4px 8px; font-size: 11px; margin: 0;">Local 3005</button>
        </div>
        
        <label for="device-id">Device / Loket ID</label>
        <input id="device-id" placeholder="loket-pc-1">
        
        <div class="modal-actions">
          <button id="cancel-settings" type="button">Batal</button>
          <button id="save-settings" type="button">Simpan</button>
        </div>
      </form>
    </div>
    <script src="mers-gen-map.js"></script>
    <script>
      const invoke = window.__TAURI__.core.invoke;
      const input = document.getElementById('uid');
      const hint = document.getElementById('hint');
      const defaultServer = 'http://107.102.8.148/MERS';

      let currentConfig = {
        gateway_url: 'wss://makan.endrisusanto.my.id',
        device_id: 'loket-pc-1',
        server_url: 'http://107.102.8.148/MERS'
      };

      async function loadConfig() {
        try {
          const cfg = await invoke('get_agent_config');
          if (cfg) {
            currentConfig = cfg;
          }
        } catch (e) {
          console.error("Gagal memuat konfigurasi dari backend:", e);
        }
      }

      function serverUrl() {
        return (currentConfig.server_url || defaultServer).replace(/\/+$/, '');
      }

      function setBadge(id, text, kind) {
        const badge = document.getElementById(id);
        badge.textContent = text;
        badge.className = `pill ${kind}`;
      }

      async function checkStatuses() {
        setBadge('app-status', 'app online', 'ok');
        setBadge('bridge-status', window.__TAURI__?.core?.invoke ? 'bridge online' : 'bridge offline', window.__TAURI__?.core?.invoke ? 'ok' : 'bad');
        try {
          const online = await invoke('ping_server', { server: serverUrl() });
          setBadge('mers-status', online ? 'mers online' : 'mers offline', online ? 'ok' : 'bad');
        } catch {
          setBadge('mers-status', 'mers offline', 'bad');
        }
        try {
          const status = await invoke('get_ws_status');
          setBadge('gateway-status', `gateway ${status}`, status === 'online' ? 'ok' : status === 'connecting' ? 'warn' : 'bad');
        } catch {
          setBadge('gateway-status', 'gateway offline', 'bad');
        }
      }

      function uidValue() {
        input.value = input.value.replace(/\D/g, '').slice(0, 10);
        if (window.MERS_GEN_UID?.[input.value]) return window.MERS_GEN_UID[input.value];
        if (/^\d{8,10}$/.test(input.value)) return input.value;
        hint.textContent = 'GEN tidak terdaftar atau ID kartu tidak valid.';
        input.focus();
        return '';
      }

      function showHome() {
        hint.textContent = '';
        document.getElementById('result-modal').hidden = true;
        document.body.dataset.step = 'home';
        input.focus();
      }

      function safe(value) {
        return value ?? '-';
      }

      function esc(value) {
        return String(safe(value)).replace(/[&<>"']/g, char => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        }[char]));
      }

      function menuItems(menu) {
        return [
          ['Karbo', menu.carbo_name, menu.menu_carbo],
          ['Utama', menu.main_name || menu.menu_detail_name || menu.menu_name, menu.menu_main || menu.main_id],
          ['Sayur', menu.soup_name, menu.menu_soup],
          ['Pendamping', menu.option1_name || menu.option2_name, menu.menu_option1 || menu.menu_option2],
          ['Sambal', menu.option3_name, menu.menu_option3],
          ['Buah', menu.fruit_name, menu.menu_fruit],
          ['Minuman', menu.additional_name, menu.menu_additional],
        ].map(([label, name, id]) => ({ label, name: name || (id ? `#${id}` : '-') }));
      }

      function renderBento(menu, portions) {
        return `
          <div class="item">
            <div class="bento-head">
              <h2>Bento Menu</h2>
              <div class="portion">Sisa Porsi: ${esc(portions)}</div>
            </div>
            <div class="bento">
              ${menuItems(menu).map(item => `
                <div class="bento-card">
                  <div class="bento-label">${esc(item.label)}</div>
                  <div class="bento-name">${esc(item.name)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      let currentCarouselIndex = 0;

      function renderCekPesanan(data) {
        const orders = data?.data?.orders || [];
        if (!orders.length) {
          return `<div class="item status">${esc(data.message)}</div>`;
        }
        currentCarouselIndex = 0;
        
        const cardsHtml = orders.map((order, idx) => `
          <div class="order-card-wrapper" id="carousel-card-${idx}" style="${idx === 0 ? 'display: block;' : 'display: none;'}">
            <div class="order-card">
              <div class="item">
                <h2>${esc(order.schedule_meal_name)} - ${esc(order.menu_name)}</h2>
                <div class="meta">
                  <span>Nama<b>${esc(order.first_name)}</b></span>
                  <span>Dept<b>${esc(order.dept)}</b></span>
                  <span>Loket<b>${esc(order.loket_name || order.order_loket)}</b></span>
                  <span ${order.order_ambil ? 'style="background: #16a34a; color: #fff; padding: 6px; text-align: center; display: flex; flex-direction: column; justify-content: center;"' : 'style="background: #dc2626; color: #fff; padding: 6px; text-align: center; display: flex; flex-direction: column; justify-content: center;"'}>Status Ambil<b style="color: #fff !important;">${order.order_ambil ? 'Sudah' : 'Belum'}</b></span>
                  <span>Kategori<b>${esc(order.base_menu)}</b></span>
                  <span>Tanggal<b>${esc(order.schedule_date)}</b></span>
                </div>
              </div>
              ${renderBento(order, order.remaining_portions || order.final_order)}
            </div>
          </div>
        `).join('');

        const navigationHtml = orders.length > 1 ? `
          <div class="carousel-nav" style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 10px;">
            <button id="carousel-prev" type="button" class="back" style="margin: 0; flex: 1;">⬅ Prev</button>
            <span id="carousel-indicator" style="font-weight: bold; font-size: 14px;">1 / ${orders.length}</span>
            <button id="carousel-next" type="button" class="back" style="margin: 0; flex: 1;">Next ➡</button>
          </div>
        ` : '';

        setTimeout(() => {
          setupCarouselListeners(orders.length);
        }, 50);

        return `<div class="carousel-container">${cardsHtml}${navigationHtml}</div>`;
      }

      function setupCarouselListeners(total) {
        if (total <= 1) return;
        const prevBtn = document.getElementById('carousel-prev');
        const nextBtn = document.getElementById('carousel-next');
        const indicator = document.getElementById('carousel-indicator');
        if (!prevBtn || !nextBtn || !indicator) return;
        
        const updateCarousel = () => {
          for (let i = 0; i < total; i++) {
            const card = document.getElementById(`carousel-card-${i}`);
            if (card) {
              card.style.display = i === currentCarouselIndex ? 'block' : 'none';
            }
          }
          indicator.textContent = `${currentCarouselIndex + 1} / ${total}`;
        };
        
        prevBtn.onclick = () => {
          currentCarouselIndex = (currentCarouselIndex - 1 + total) % total;
          updateCarousel();
        };
        
        nextBtn.onclick = () => {
          currentCarouselIndex = (currentCarouselIndex + 1) % total;
          updateCarousel();
        };
      }

      function renderTapIn(data) {
        const tap = data?.tap || data;
        const schedule = data?.schedule?.data?.schedules?.[0] || {};
        const info = tap?.data || {};
        const wrongLoket = tap?.status === 'no_menu' || data?.schedule?.data?.schedule_count === 0;
        const message = wrongLoket ? 'Silakan pilih loket nomor yang benar.' : tap.message;
        const statusText = `${tap?.status || ''} ${message || ''}`.toLowerCase();
        const statusClass = wrongLoket || statusText.includes('sudah') || statusText.includes('diambil') ? 'status-danger' : statusText.includes('tidak pesan') || statusText.includes('unplan') ? 'status-warn' : tap?.success ? 'status-ok' : 'status-danger';
        return `
          <div class="item status ${wrongLoket ? 'wrong' : statusClass}">${esc(message)}</div>
          <div class="item">
            <h2>${esc(info.employee_name)} - Loket ${esc(info.loket)}</h2>
            <div class="meta">
              <span>UID Hex<b>${esc(info.uid_hex)}</b></span>
              <span>Menu<b>${esc(info.menu_info || schedule.menu_name)}</b></span>
              <span>Sisa Porsi<b>${esc(info.remaining_count || schedule.remaining_portions)}</b></span>
              <span>Total Order<b>${esc(info.total_order || schedule.total_orders)}</b></span>
              <span>Sudah Ambil<b>${esc(info.taken_count || schedule.taken_orders)}</b></span>
              <span>Meal<b>${esc(tap.meal_time || data?.schedule?.data?.meal_time)}</b></span>
            </div>
          </div>
          ${wrongLoket ? '' : renderBento(schedule, info.remaining_count || schedule.remaining_portions)}
        `;
      }

      async function runAction(command, payload, title) {
        hint.textContent = 'Memproses...';
        try {
          const data = await invoke(command, { ...payload, server: serverUrl() });
          document.getElementById('result-title').textContent = title;
          document.getElementById('result-id').textContent = payload.uid;
          document.getElementById('result-summary').innerHTML = command === 'tap_in' ? renderTapIn(data) : renderCekPesanan(data);
          document.getElementById('result-body').textContent = JSON.stringify(data, null, 2);
          document.getElementById('api-details').removeAttribute('open');
          document.getElementById('result-modal').hidden = false;
          hint.textContent = '';
        } catch (error) {
          hint.textContent = String(error);
        }
      }

      input.addEventListener('input', uidValue);
      document.getElementById('cek').addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        runAction('cek_pesanan', { uid }, 'Cek Menu Pesanan');
      });
      document.getElementById('tap').addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        document.getElementById('selected').textContent = uid;
        hint.textContent = 'Pilih loket.';
        document.body.dataset.step = 'tap';
      });
      document.getElementById('back').addEventListener('click', () => {
        showHome();
      });
      document.getElementById('home').addEventListener('click', showHome);
      document.getElementById('settings').addEventListener('click', async () => {
        await loadConfig();
        document.getElementById('server-url').value = currentConfig.server_url || '';
        document.getElementById('gateway-url').value = currentConfig.gateway_url || '';
        document.getElementById('device-id').value = currentConfig.device_id || '';
        document.getElementById('config').hidden = false;
      });
      document.getElementById('cancel-settings').addEventListener('click', () => {
        document.getElementById('config').hidden = true;
      });
      document.getElementById('preset-prod').addEventListener('click', () => {
        document.getElementById('gateway-url').value = 'wss://makan.endrisusanto.my.id';
      });
      document.getElementById('preset-local3').addEventListener('click', () => {
        document.getElementById('gateway-url').value = 'ws://localhost:3000/ws';
      });
      document.getElementById('preset-local5').addEventListener('click', () => {
        document.getElementById('gateway-url').value = 'ws://localhost:3005/ws';
      });
      document.getElementById('save-settings').addEventListener('click', async () => {
        const server_url = document.getElementById('server-url').value.trim() || defaultServer;
        const gateway_url = document.getElementById('gateway-url').value.trim() || 'wss://makan.endrisusanto.my.id';
        const device_id = document.getElementById('device-id').value.trim() || 'loket-pc-1';

        hint.textContent = 'Menyimpan konfigurasi...';
        try {
          await invoke('save_agent_config', {
            serverUrl: server_url,
            gatewayUrl: gateway_url,
            deviceId: device_id
          });
          currentConfig = {
            server_url,
            gateway_url,
            device_id
          };
          localStorage.mersDesktopServer = server_url;
          document.getElementById('config').hidden = true;
          hint.textContent = `Konfigurasi disimpan. Server: ${serverUrl()}`;
          await checkStatuses();
        } catch (error) {
          hint.textContent = `Gagal menyimpan: ${error}`;
        }
      });
      document.querySelectorAll('[data-loket]').forEach(button => button.addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        runAction('tap_in', { uid, loket: button.dataset.loket }, `Tap In Scanner - Loket ${button.dataset.loket}`);
      }));

      async function init() {
        await loadConfig();
        if (window.__TAURI__?.event?.listen) {
          window.__TAURI__.event.listen('ws-status', (event) => {
            const status = event.payload;
            if (status.startsWith('offline')) {
              setBadge('gateway-status', status, 'bad');
            } else {
              setBadge('gateway-status', `gateway ${status}`, status === 'online' ? 'ok' : status === 'connecting' ? 'warn' : 'bad');
            }
          });
        }
        await checkStatuses();
        setInterval(checkStatuses, 15000);
      }
      init();
    </script>
  </body>
</html>
