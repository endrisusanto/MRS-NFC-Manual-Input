<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MeRS NFC Desktop</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; background: #030303; color: #f5f5f5; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, rgba(255,255,255,.10), transparent 34%), #030303; }
      .panel { width: min(860px, calc(100vw - 48px)); padding: 34px; background: rgba(255,255,255,.075); border: 1px solid rgba(255,255,255,.18); box-shadow: 0 24px 80px rgba(0,0,0,.55); border-radius: 18px; backdrop-filter: blur(18px); }
      h1 { margin: 0 0 8px; font-size: 28px; font-weight: 850; text-align: center; }
      p { margin: 0 0 28px; color: #bdbdbd; text-align: center; }
      input { display: block; width: min(360px, 100%); height: 58px; margin: 0 auto 26px; text-align: center; border-radius: 12px; border: 1px solid rgba(255,255,255,.28); background: rgba(0,0,0,.42); color: #fff; font: 800 26px ui-monospace, Consolas, monospace; outline: none; }
      input:focus { border-color: rgba(255,255,255,.72); }
      .cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      button { border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.08); color: #fff; border-radius: 16px; cursor: pointer; transition: transform .12s ease, background .12s ease, border-color .12s ease; }
      button:hover { transform: translateY(-2px); background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.42); }
      .card { min-height: 168px; padding: 24px; text-align: left; }
      .card strong { display: block; font-size: 24px; margin-bottom: 10px; }
      .card span { color: #cfcfcf; font-size: 14px; line-height: 1.45; }
      .tap { display: none; }
      body[data-step="tap"] .home { display: none; }
      body[data-step="tap"] .tap { display: block; }
      .result { display: none; }
      body[data-step="result"] .home, body[data-step="result"] .tap { display: none; }
      body[data-step="result"] .result { display: block; }
      .selected { margin: 0 0 18px; padding: 16px; border-radius: 14px; background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.14); text-align: center; }
      .selected b { display: block; margin-top: 4px; font: 850 30px ui-monospace, Consolas, monospace; }
      .lokets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
      .loket { height: 82px; font-size: 22px; font-weight: 850; }
      .back { margin-top: 18px; height: 42px; padding: 0 16px; border-radius: 10px; background: transparent; }
      .hint { min-height: 22px; margin-top: 18px; color: #d4d4d4; text-align: center; }
      .summary { display: grid; gap: 12px; margin-top: 18px; }
      .item { padding: 16px; border-radius: 14px; background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.14); }
      .item h2 { margin: 0 0 8px; font-size: 20px; }
      .meta { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; color: #d8d8d8; font-size: 14px; }
      .meta b { display: block; color: #fff; font-size: 18px; margin-top: 4px; }
      .status { text-align: center; font-size: 18px; font-weight: 800; }
      .bento-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
      .bento-head h2 { margin: 0; }
      .portion { padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18); font-weight: 850; white-space: nowrap; }
      .bento { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
      .bento-card { min-height: 172px; padding: 10px; border-radius: 14px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); }
      .bento-card img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; border-radius: 10px; background: rgba(0,0,0,.38); display: block; }
      .bento-label { margin-top: 8px; color: #bdbdbd; font-size: 12px; font-weight: 800; text-transform: uppercase; }
      .bento-name { margin-top: 3px; font-size: 14px; font-weight: 750; line-height: 1.25; overflow-wrap: anywhere; }
      pre { max-height: 420px; overflow: auto; margin: 18px 0 0; padding: 18px; border-radius: 14px; background: rgba(0,0,0,.38); border: 1px solid rgba(255,255,255,.14); white-space: pre-wrap; font: 14px ui-monospace, Consolas, monospace; }
      @media (max-width: 860px) { .bento { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      @media (max-width: 680px) { .cards, .lokets, .meta, .bento { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body data-step="home">
    <main class="panel">
      <section class="home">
        <h1>MeRS Desktop</h1>
        <p>Masukkan GEN 8 digit atau ID kartu 10 digit yang akan dieksekusi.</p>
        <input id="uid" inputmode="numeric" maxlength="10" autocomplete="off" placeholder="1696235068" autofocus>
        <div class="cards">
          <button class="card" id="tap"><strong>Tap In Scanner</strong><span>Masuk ke pilihan loket untuk ID ini.</span></button>
          <button class="card" id="cek"><strong>Cek Menu Pesanan</strong><span>Langsung tampilkan detail pesanan ID ini.</span></button>
        </div>
      </section>
      <section class="tap">
        <h1>Tap In Scanner</h1>
        <div class="selected">ID yang akan dieksekusi<b id="selected"></b></div>
        <div class="lokets">
          <button class="loket" data-loket="1">Loket 1</button>
          <button class="loket" data-loket="2">Loket 2</button>
          <button class="loket" data-loket="3">Loket 3</button>
          <button class="loket" data-loket="4">Loket 4</button>
          <button class="loket" data-loket="5">Loket 5</button>
          <button class="loket" data-loket="6">Loket 6</button>
        </div>
        <button class="back" id="back">Kembali</button>
      </section>
      <section class="result">
        <h1 id="result-title">Detail</h1>
        <div class="selected">ID<b id="result-id"></b></div>
        <div id="result-summary" class="summary"></div>
        <pre id="result-body"></pre>
        <button class="back" id="home">Beranda</button>
      </section>
      <div class="hint" id="hint"></div>
    </main>
    <script>
      const invoke = window.__TAURI__.core.invoke;
      const input = document.getElementById('uid');
      const hint = document.getElementById('hint');

      function uidValue() {
        input.value = input.value.replace(/\D/g, '').slice(0, 10);
        if (/^\d{8,10}$/.test(input.value)) return input.value;
        hint.textContent = 'ID harus 8-10 digit angka.';
        input.focus();
        return '';
      }

      function showHome() {
        hint.textContent = '';
        document.body.dataset.step = 'home';
        input.focus();
      }

      function safe(value) {
        return value ?? '-';
      }

      function esc(value) {
        return String(safe(value)).replace(/[&<>"']/g, char => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        }[char]));
      }

      function menuItems(menu) {
        return [
          ['Karbo', menu.carbo_name, menu.carbo_pic, menu.menu_carbo],
          ['Utama', menu.main_name || menu.menu_detail_name || menu.menu_name, menu.menu_detail_pic, menu.menu_main || menu.main_id],
          ['Sayur', menu.soup_name, menu.soup_pic, menu.menu_soup],
          ['Pendamping', menu.option1_name || menu.option2_name, menu.option1_pic || menu.option2_pic, menu.menu_option1 || menu.menu_option2],
          ['Sambal', menu.option3_name, menu.option3_pic, menu.menu_option3],
          ['Buah', menu.fruit_name, menu.fruit_pic, menu.menu_fruit],
          ['Minuman', menu.additional_name, menu.additional_pic, menu.menu_additional],
        ].map(([label, name, pic, id]) => ({ label, name: name || (id ? `#${id}` : '-'), pic }));
      }

      function renderBento(menu, portions) {
        const base = 'http://107.102.8.148/MERS/assets/images/menu/';
        return `
          <div class="item">
            <div class="bento-head">
              <h2>Bento Menu</h2>
              <div class="portion">Sisa Porsi: ${esc(portions)}</div>
            </div>
            <div class="bento">
              ${menuItems(menu).map(item => `
                <div class="bento-card">
                  ${item.pic ? `<img src="${base}${esc(item.pic)}" alt="${esc(item.name)}" onerror="this.style.display='none'">` : ''}
                  <div class="bento-label">${esc(item.label)}</div>
                  <div class="bento-name">${esc(item.name)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      function renderCekPesanan(data) {
        const orders = data?.data?.orders || [];
        if (!orders.length) {
          return `<div class="item status">${esc(data.message)}</div>`;
        }
        return orders.map(order => `
          <div class="item">
            <h2>${esc(order.schedule_meal_name)} - ${esc(order.menu_name)}</h2>
            <div class="meta">
              <span>Nama<b>${esc(order.first_name)}</b></span>
              <span>Dept<b>${esc(order.dept)}</b></span>
              <span>Loket<b>${esc(order.loket_name || order.order_loket)}</b></span>
              <span>Status Ambil<b>${order.order_ambil ? 'Sudah' : 'Belum'}</b></span>
              <span>Kategori<b>${esc(order.base_menu)}</b></span>
              <span>Tanggal<b>${esc(order.schedule_date)}</b></span>
            </div>
          </div>
          ${renderBento(order, order.remaining_portions || order.final_order)}
        `).join('');
      }

      function renderTapIn(data) {
        const tap = data?.tap || data;
        const schedule = data?.schedule?.data?.schedules?.[0] || {};
        const info = tap?.data || {};
        return `
          <div class="item status">${esc(tap.message)}</div>
          <div class="item">
            <h2>${esc(info.employee_name)} - Loket ${esc(info.loket)}</h2>
            <div class="meta">
              <span>UID Hex<b>${esc(info.uid_hex)}</b></span>
              <span>Menu<b>${esc(info.menu_info || schedule.menu_name)}</b></span>
              <span>Sisa Porsi<b>${esc(info.remaining_count || schedule.remaining_portions)}</b></span>
              <span>Total Order<b>${esc(info.total_order || schedule.total_orders)}</b></span>
              <span>Sudah Ambil<b>${esc(info.taken_count || schedule.taken_orders)}</b></span>
              <span>Meal<b>${esc(tap.meal_time || data?.schedule?.data?.meal_time)}</b></span>
            </div>
          </div>
          ${renderBento(schedule, info.remaining_count || schedule.remaining_portions)}
        `;
      }

      async function runAction(command, payload, title) {
        hint.textContent = 'Memproses...';
        try {
          const data = await invoke(command, payload);
          document.getElementById('result-title').textContent = title;
          document.getElementById('result-id').textContent = payload.uid;
          document.getElementById('result-summary').innerHTML = command === 'tap_in' ? renderTapIn(data) : renderCekPesanan(data);
          document.getElementById('result-body').textContent = JSON.stringify(data, null, 2);
          document.body.dataset.step = 'result';
          hint.textContent = '';
        } catch (error) {
          hint.textContent = String(error);
        }
      }

      input.addEventListener('input', uidValue);
      document.getElementById('cek').addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        runAction('cek_pesanan', { uid }, 'Cek Menu Pesanan');
      });
      document.getElementById('tap').addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        document.getElementById('selected').textContent = uid;
        hint.textContent = 'Pilih loket.';
        document.body.dataset.step = 'tap';
      });
      document.getElementById('back').addEventListener('click', () => {
        showHome();
      });
      document.getElementById('home').addEventListener('click', showHome);
      document.querySelectorAll('[data-loket]').forEach(button => button.addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        runAction('tap_in', { uid, loket: button.dataset.loket }, `Tap In Scanner - Loket ${button.dataset.loket}`);
      }));
    </script>
  </body>
</html>
