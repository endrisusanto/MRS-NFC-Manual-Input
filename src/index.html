<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MeRS NFC Desktop</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; background: #030303; color: #f5f5f5; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { height: 100vh; display: grid; place-items: stretch; padding: 6px; background: radial-gradient(circle at top, rgba(255,255,255,.10), transparent 34%), #030303; overflow: hidden; }
      .panel { width: 100%; height: 100%; overflow: hidden; padding: clamp(10px, 1.6vw, 18px); background: rgba(255,255,255,.075); border: 1px solid rgba(255,255,255,.18); box-shadow: 0 24px 80px rgba(0,0,0,.55); border-radius: 14px; backdrop-filter: blur(18px); }
      h1 { margin: 0 0 6px; font-size: 24px; font-weight: 850; text-align: center; }
      p { margin: 0 0 16px; color: #bdbdbd; text-align: center; }
      input { display: block; width: min(360px, 100%); height: 50px; margin: 0 auto 16px; text-align: center; border-radius: 12px; border: 1px solid rgba(255,255,255,.28); background: rgba(0,0,0,.42); color: #fff; font: 800 24px ui-monospace, Consolas, monospace; outline: none; }
      input:focus { border-color: rgba(255,255,255,.72); }
      .cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      button { border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.08); color: #fff; border-radius: 16px; cursor: pointer; transition: transform .12s ease, background .12s ease, border-color .12s ease; }
      button:hover { transform: translateY(-2px); background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.42); }
      .card { min-height: 124px; padding: 18px; text-align: left; }
      .card strong { display: block; font-size: 22px; margin-bottom: 8px; }
      .card span { color: #cfcfcf; font-size: 14px; line-height: 1.45; }
      .tap { display: none; }
      body[data-step="tap"] .home { display: none; }
      body[data-step="tap"] .tap { display: block; }
      .result { display: none; }
      body[data-step="result"] .home, body[data-step="result"] .tap { display: none; }
      body[data-step="result"] .result { display: block; }
      .selected { margin: 0 0 10px; padding: 10px; border-radius: 12px; background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.14); text-align: center; }
      .selected b { display: block; margin-top: 2px; font: 850 24px ui-monospace, Consolas, monospace; }
      .lokets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .loket { height: 64px; font-size: 20px; font-weight: 850; }
      .back { margin-top: 10px; height: 36px; padding: 0 14px; border-radius: 10px; background: transparent; }
      .hint { min-height: 20px; margin-top: 10px; color: #d4d4d4; text-align: center; font-weight: 700; }
      .badges { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
      .pill { padding: 6px 9px; border-radius: 999px; border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.08); color: #e5e5e5; font-size: 12px; font-weight: 850; }
      .pill.ok { color: #dcfce7; border-color: rgba(34,197,94,.70); background: rgba(22,101,52,.70); }
      .pill.warn { color: #fef3c7; border-color: rgba(245,158,11,.80); background: rgba(146,64,14,.78); }
      .pill.bad { color: #fee2e2; border-color: rgba(239,68,68,.82); background: rgba(127,29,29,.78); }
      .server-btn { display: block; width: 120px; height: 34px; margin: 0 auto 12px; border-radius: 10px; font-size: 13px; font-weight: 850; }
      .summary { display: grid; gap: 8px; margin-top: 10px; }
      .order-strip { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .order-strip.single { grid-template-columns: 1fr; }
      .order-card { display: grid; gap: 8px; align-content: start; min-width: 0; }
      .item { padding: 10px; border-radius: 12px; background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.14); }
      .item h2 { margin: 0 0 6px; font-size: 17px; }
      .meta { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; color: #d8d8d8; font-size: 12px; }
      .meta b { display: block; color: #fff; font-size: 14px; margin-top: 2px; overflow-wrap: anywhere; }
      .status { text-align: center; font-size: 16px; font-weight: 900; }
      .status-ok { color: #dcfce7; border-color: rgba(34,197,94,.70); background: rgba(22,101,52,.70); }
      .status-warn { color: #fef3c7; border-color: rgba(245,158,11,.80); background: rgba(146,64,14,.78); }
      .status-danger { color: #fee2e2; border-color: rgba(239,68,68,.82); background: rgba(127,29,29,.78); }
      .wrong { border-color: rgba(239,68,68,.82); background: rgba(127,29,29,.78); color: #fee2e2; }
      .bento-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
      .bento-head h2 { margin: 0; font-size: 16px; }
      .portion { padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18); font-size: 13px; font-weight: 850; white-space: nowrap; }
      .bento { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; }
      .bento-card { min-height: 72px; padding: 10px; border-radius: 10px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); }
      .bento-label { color: #bdbdbd; font-size: 10px; font-weight: 800; text-transform: uppercase; }
      .bento-name { margin-top: 5px; font-size: 13px; font-weight: 800; line-height: 1.2; overflow-wrap: anywhere; }
      details { margin-top: 8px; border-radius: 12px; background: rgba(0,0,0,.30); border: 1px solid rgba(255,255,255,.14); overflow: hidden; }
      summary { padding: 9px 12px; cursor: pointer; font-weight: 850; }
      pre { max-height: 170px; overflow: auto; margin: 0; padding: 12px; border-top: 1px solid rgba(255,255,255,.12); background: rgba(0,0,0,.32); white-space: pre-wrap; font: 12px ui-monospace, Consolas, monospace; }
      .modal { position: fixed; inset: 0; z-index: 10; display: grid; place-items: center; padding: 16px; background: rgba(0,0,0,.72); }
      .modal[hidden] { display: none; }
      .modal form { width: min(460px, 100%); padding: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,.20); background: #111; }
      .modal label { display: block; margin-bottom: 8px; color: #d4d4d4; font-size: 12px; font-weight: 850; text-transform: uppercase; }
      .modal input { width: 100%; max-width: none; margin-bottom: 12px; text-align: left; font-size: 16px; }
      .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .modal-actions button { height: 42px; border-radius: 10px; }
      @media (max-width: 980px) {
        .order-strip { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 8px; }
        .order-card { flex: 0 0 min(92%, 620px); scroll-snap-align: center; }
      }
      @media (max-width: 860px) { .bento { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
      @media (max-width: 680px) { body { padding: 4px; } .cards, .lokets, .meta { grid-template-columns: 1fr; } .bento { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      @media (orientation: landscape) and (max-height: 720px) {
        .panel { padding: 8px; }
        h1 { font-size: 20px; }
        p { margin-bottom: 10px; }
        input { height: 42px; margin-bottom: 10px; font-size: 21px; }
        .card { min-height: 96px; padding: 14px; }
        .selected { padding: 8px; margin-bottom: 8px; }
        .selected b { font-size: 22px; }
        .loket { height: 52px; font-size: 18px; }
        .bento-card { min-height: 58px; padding: 8px; }
        .bento-name { font-size: 12px; }
      }
    </style>
  </head>
  <body data-step="home">
    <main class="panel">
      <div class="badges">
        <span id="app-status" class="pill warn">app...</span>
        <span id="bridge-status" class="pill warn">bridge...</span>
        <span id="mers-status" class="pill warn">mers...</span>
      </div>
      <section class="home">
        <h1>MeRS Desktop</h1>
        <p>Masukkan GEN 8 digit atau ID kartu 10 digit yang akan dieksekusi.</p>
        <button class="server-btn" id="settings">Server</button>
        <input id="uid" inputmode="numeric" maxlength="10" autocomplete="off" placeholder="1696235068" autofocus>
        <div class="cards">
          <button class="card" id="tap"><strong>Tap In Scanner</strong><span>Masuk ke pilihan loket untuk ID ini.</span></button>
          <button class="card" id="cek"><strong>Cek Menu Pesanan</strong><span>Langsung tampilkan detail pesanan ID ini.</span></button>
        </div>
      </section>
      <section class="tap">
        <h1>Tap In Scanner</h1>
        <div class="selected">ID yang akan dieksekusi<b id="selected"></b></div>
        <div class="lokets">
          <button class="loket" data-loket="1">Loket 1</button>
          <button class="loket" data-loket="2">Loket 2</button>
          <button class="loket" data-loket="3">Loket 3</button>
          <button class="loket" data-loket="4">Loket 4</button>
          <button class="loket" data-loket="5">Loket 5</button>
          <button class="loket" data-loket="6">Loket 6</button>
        </div>
        <button class="back" id="back">Kembali</button>
      </section>
      <section class="result">
        <h1 id="result-title">Detail</h1>
        <div class="selected">ID<b id="result-id"></b></div>
        <div id="result-summary" class="summary"></div>
        <details id="api-details">
          <summary>API Response</summary>
          <pre id="result-body"></pre>
        </details>
        <button class="back" id="home">Beranda</button>
      </section>
      <div class="hint" id="hint"></div>
    </main>
    <div id="config" class="modal" hidden>
      <form>
        <label for="server-url">URL Server MeRS</label>
        <input id="server-url" placeholder="http://107.102.8.148/MERS">
        <div class="modal-actions">
          <button id="cancel-settings" type="button">Batal</button>
          <button id="save-settings" type="button">Simpan</button>
        </div>
      </form>
    </div>
    <script>
      const invoke = window.__TAURI__.core.invoke;
      const input = document.getElementById('uid');
      const hint = document.getElementById('hint');
      const defaultServer = 'http://107.102.8.148/MERS';

      function serverUrl() {
        return (localStorage.mersDesktopServer || defaultServer).replace(/\/+$/, '');
      }

      function setBadge(id, text, kind) {
        const badge = document.getElementById(id);
        badge.textContent = text;
        badge.className = `pill ${kind}`;
      }

      async function checkStatuses() {
        setBadge('app-status', 'app online', 'ok');
        setBadge('bridge-status', window.__TAURI__?.core?.invoke ? 'bridge online' : 'bridge offline', window.__TAURI__?.core?.invoke ? 'ok' : 'bad');
        try {
          const online = await invoke('ping_server', { server: serverUrl() });
          setBadge('mers-status', online ? 'mers online' : 'mers offline', online ? 'ok' : 'bad');
        } catch {
          setBadge('mers-status', 'mers offline', 'bad');
        }
      }

      function uidValue() {
        input.value = input.value.replace(/\D/g, '').slice(0, 10);
        if (/^\d{8,10}$/.test(input.value)) return input.value;
        hint.textContent = 'ID harus 8-10 digit angka.';
        input.focus();
        return '';
      }

      function showHome() {
        hint.textContent = '';
        document.body.dataset.step = 'home';
        input.focus();
      }

      function safe(value) {
        return value ?? '-';
      }

      function esc(value) {
        return String(safe(value)).replace(/[&<>"']/g, char => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        }[char]));
      }

      function menuItems(menu) {
        return [
          ['Karbo', menu.carbo_name, menu.menu_carbo],
          ['Utama', menu.main_name || menu.menu_detail_name || menu.menu_name, menu.menu_main || menu.main_id],
          ['Sayur', menu.soup_name, menu.menu_soup],
          ['Pendamping', menu.option1_name || menu.option2_name, menu.menu_option1 || menu.menu_option2],
          ['Sambal', menu.option3_name, menu.menu_option3],
          ['Buah', menu.fruit_name, menu.menu_fruit],
          ['Minuman', menu.additional_name, menu.menu_additional],
        ].map(([label, name, id]) => ({ label, name: name || (id ? `#${id}` : '-') }));
      }

      function renderBento(menu, portions) {
        return `
          <div class="item">
            <div class="bento-head">
              <h2>Bento Menu</h2>
              <div class="portion">Sisa Porsi: ${esc(portions)}</div>
            </div>
            <div class="bento">
              ${menuItems(menu).map(item => `
                <div class="bento-card">
                  <div class="bento-label">${esc(item.label)}</div>
                  <div class="bento-name">${esc(item.name)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      function renderCekPesanan(data) {
        const orders = data?.data?.orders || [];
        if (!orders.length) {
          return `<div class="item status">${esc(data.message)}</div>`;
        }
        return `<div class="order-strip ${orders.length === 1 ? 'single' : ''}">${orders.map(order => `
          <div class="order-card">
            <div class="item">
              <h2>${esc(order.schedule_meal_name)} - ${esc(order.menu_name)}</h2>
              <div class="meta">
                <span>Nama<b>${esc(order.first_name)}</b></span>
                <span>Dept<b>${esc(order.dept)}</b></span>
                <span>Loket<b>${esc(order.loket_name || order.order_loket)}</b></span>
                <span>Status Ambil<b>${order.order_ambil ? 'Sudah' : 'Belum'}</b></span>
                <span>Kategori<b>${esc(order.base_menu)}</b></span>
                <span>Tanggal<b>${esc(order.schedule_date)}</b></span>
              </div>
            </div>
            ${renderBento(order, order.remaining_portions || order.final_order)}
          </div>
        `).join('')}</div>`;
      }

      function renderTapIn(data) {
        const tap = data?.tap || data;
        const schedule = data?.schedule?.data?.schedules?.[0] || {};
        const info = tap?.data || {};
        const wrongLoket = tap?.status === 'no_menu' || data?.schedule?.data?.schedule_count === 0;
        const message = wrongLoket ? 'Silakan pilih loket nomor yang benar.' : tap.message;
        const statusText = `${tap?.status || ''} ${message || ''}`.toLowerCase();
        const statusClass = wrongLoket || statusText.includes('sudah') || statusText.includes('diambil') ? 'status-danger' : statusText.includes('tidak pesan') || statusText.includes('unplan') ? 'status-warn' : tap?.success ? 'status-ok' : 'status-danger';
        return `
          <div class="item status ${wrongLoket ? 'wrong' : statusClass}">${esc(message)}</div>
          <div class="item">
            <h2>${esc(info.employee_name)} - Loket ${esc(info.loket)}</h2>
            <div class="meta">
              <span>UID Hex<b>${esc(info.uid_hex)}</b></span>
              <span>Menu<b>${esc(info.menu_info || schedule.menu_name)}</b></span>
              <span>Sisa Porsi<b>${esc(info.remaining_count || schedule.remaining_portions)}</b></span>
              <span>Total Order<b>${esc(info.total_order || schedule.total_orders)}</b></span>
              <span>Sudah Ambil<b>${esc(info.taken_count || schedule.taken_orders)}</b></span>
              <span>Meal<b>${esc(tap.meal_time || data?.schedule?.data?.meal_time)}</b></span>
            </div>
          </div>
          ${wrongLoket ? '' : renderBento(schedule, info.remaining_count || schedule.remaining_portions)}
        `;
      }

      async function runAction(command, payload, title) {
        hint.textContent = 'Memproses...';
        try {
          const data = await invoke(command, { ...payload, server: serverUrl() });
          document.getElementById('result-title').textContent = title;
          document.getElementById('result-id').textContent = payload.uid;
          document.getElementById('result-summary').innerHTML = command === 'tap_in' ? renderTapIn(data) : renderCekPesanan(data);
          document.getElementById('result-body').textContent = JSON.stringify(data, null, 2);
          document.getElementById('api-details').removeAttribute('open');
          document.body.dataset.step = 'result';
          hint.textContent = '';
        } catch (error) {
          hint.textContent = String(error);
        }
      }

      input.addEventListener('input', uidValue);
      document.getElementById('cek').addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        runAction('cek_pesanan', { uid }, 'Cek Menu Pesanan');
      });
      document.getElementById('tap').addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        document.getElementById('selected').textContent = uid;
        hint.textContent = 'Pilih loket.';
        document.body.dataset.step = 'tap';
      });
      document.getElementById('back').addEventListener('click', () => {
        showHome();
      });
      document.getElementById('home').addEventListener('click', showHome);
      document.getElementById('settings').addEventListener('click', () => {
        document.getElementById('server-url').value = serverUrl();
        document.getElementById('config').hidden = false;
      });
      document.getElementById('cancel-settings').addEventListener('click', () => {
        document.getElementById('config').hidden = true;
      });
      document.getElementById('save-settings').addEventListener('click', () => {
        localStorage.mersDesktopServer = (document.getElementById('server-url').value.trim() || defaultServer).replace(/\/+$/, '');
        document.getElementById('config').hidden = true;
        hint.textContent = `Server: ${serverUrl()}`;
        checkStatuses();
      });
      document.querySelectorAll('[data-loket]').forEach(button => button.addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        runAction('tap_in', { uid, loket: button.dataset.loket }, `Tap In Scanner - Loket ${button.dataset.loket}`);
      }));
      checkStatuses();
      setInterval(checkStatuses, 15000);
    </script>
  </body>
</html>
