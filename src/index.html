<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MeRS NFC Desktop</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; background: #030303; color: #f5f5f5; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, rgba(255,255,255,.10), transparent 34%), #030303; }
      .panel { width: min(860px, calc(100vw - 48px)); padding: 34px; background: rgba(255,255,255,.075); border: 1px solid rgba(255,255,255,.18); box-shadow: 0 24px 80px rgba(0,0,0,.55); border-radius: 18px; backdrop-filter: blur(18px); }
      h1 { margin: 0 0 8px; font-size: 28px; font-weight: 850; text-align: center; }
      p { margin: 0 0 28px; color: #bdbdbd; text-align: center; }
      input { display: block; width: min(360px, 100%); height: 58px; margin: 0 auto 26px; text-align: center; border-radius: 12px; border: 1px solid rgba(255,255,255,.28); background: rgba(0,0,0,.42); color: #fff; font: 800 26px ui-monospace, Consolas, monospace; outline: none; }
      input:focus { border-color: rgba(255,255,255,.72); }
      .cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      button { border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.08); color: #fff; border-radius: 16px; cursor: pointer; transition: transform .12s ease, background .12s ease, border-color .12s ease; }
      button:hover { transform: translateY(-2px); background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.42); }
      .card { min-height: 168px; padding: 24px; text-align: left; }
      .card strong { display: block; font-size: 24px; margin-bottom: 10px; }
      .card span { color: #cfcfcf; font-size: 14px; line-height: 1.45; }
      .tap { display: none; }
      body[data-step="tap"] .home { display: none; }
      body[data-step="tap"] .tap { display: block; }
      .result { display: none; }
      body[data-step="result"] .home, body[data-step="result"] .tap { display: none; }
      body[data-step="result"] .result { display: block; }
      .selected { margin: 0 0 18px; padding: 16px; border-radius: 14px; background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.14); text-align: center; }
      .selected b { display: block; margin-top: 4px; font: 850 30px ui-monospace, Consolas, monospace; }
      .lokets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
      .loket { height: 82px; font-size: 22px; font-weight: 850; }
      .back { margin-top: 18px; height: 42px; padding: 0 16px; border-radius: 10px; background: transparent; }
      .hint { min-height: 22px; margin-top: 18px; color: #d4d4d4; text-align: center; }
      pre { max-height: 420px; overflow: auto; margin: 18px 0 0; padding: 18px; border-radius: 14px; background: rgba(0,0,0,.38); border: 1px solid rgba(255,255,255,.14); white-space: pre-wrap; font: 14px ui-monospace, Consolas, monospace; }
    </style>
  </head>
  <body data-step="home">
    <main class="panel">
      <section class="home">
        <h1>MeRS Desktop</h1>
        <p>Masukkan GEN 8 digit atau ID kartu 10 digit yang akan dieksekusi.</p>
        <input id="uid" inputmode="numeric" maxlength="10" autocomplete="off" placeholder="1696235068" autofocus>
        <div class="cards">
          <button class="card" id="tap"><strong>Tap In Scanner</strong><span>Masuk ke pilihan loket untuk ID ini.</span></button>
          <button class="card" id="cek"><strong>Cek Menu Pesanan</strong><span>Langsung tampilkan detail pesanan ID ini.</span></button>
        </div>
      </section>
      <section class="tap">
        <h1>Tap In Scanner</h1>
        <div class="selected">ID yang akan dieksekusi<b id="selected"></b></div>
        <div class="lokets">
          <button class="loket" data-loket="1">Loket 1</button>
          <button class="loket" data-loket="2">Loket 2</button>
          <button class="loket" data-loket="3">Loket 3</button>
          <button class="loket" data-loket="4">Loket 4</button>
          <button class="loket" data-loket="5">Loket 5</button>
          <button class="loket" data-loket="6">Loket 6</button>
        </div>
        <button class="back" id="back">Kembali</button>
      </section>
      <section class="result">
        <h1 id="result-title">Detail</h1>
        <div class="selected">ID<b id="result-id"></b></div>
        <pre id="result-body"></pre>
        <button class="back" id="home">Beranda</button>
      </section>
      <div class="hint" id="hint"></div>
    </main>
    <script>
      const invoke = window.__TAURI__.core.invoke;
      const input = document.getElementById('uid');
      const hint = document.getElementById('hint');

      function uidValue() {
        input.value = input.value.replace(/\D/g, '').slice(0, 10);
        if (/^\d{8,10}$/.test(input.value)) return input.value;
        hint.textContent = 'ID harus 8-10 digit angka.';
        input.focus();
        return '';
      }

      function showHome() {
        hint.textContent = '';
        document.body.dataset.step = 'home';
        input.focus();
      }

      async function runAction(command, payload, title) {
        hint.textContent = 'Memproses...';
        try {
          const data = await invoke(command, payload);
          document.getElementById('result-title').textContent = title;
          document.getElementById('result-id').textContent = payload.uid;
          document.getElementById('result-body').textContent = JSON.stringify(data, null, 2);
          document.body.dataset.step = 'result';
          hint.textContent = '';
        } catch (error) {
          hint.textContent = String(error);
        }
      }

      input.addEventListener('input', uidValue);
      document.getElementById('cek').addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        runAction('cek_pesanan', { uid }, 'Cek Menu Pesanan');
      });
      document.getElementById('tap').addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        document.getElementById('selected').textContent = uid;
        hint.textContent = 'Pilih loket.';
        document.body.dataset.step = 'tap';
      });
      document.getElementById('back').addEventListener('click', () => {
        showHome();
      });
      document.getElementById('home').addEventListener('click', showHome);
      document.querySelectorAll('[data-loket]').forEach(button => button.addEventListener('click', () => {
        const uid = uidValue();
        if (!uid) return;
        runAction('tap_in', { uid, loket: button.dataset.loket }, `Tap In Scanner - Loket ${button.dataset.loket}`);
      }));
    </script>
  </body>
</html>
