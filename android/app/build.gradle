plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'id.endri.mersremote'
    compileSdk 34

    defaultConfig {
        applicationId 'id.endri.mersremote'
        minSdk 26
        targetSdk 34
        versionCode 2
        versionName '1.0.1'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.assets.srcDirs += '../../web'
    }
}

dependencies {
    implementation 'androidx.work:work-runtime-ktx:2.9.1'
}
