<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <title>MeRS Remote</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap');
      
      * {
        box-sizing: border-box;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      :root {
        --bg-dark: #080c14;
        --bg-radial: radial-gradient(circle at top, #0f1c30 0%, #06090e 70%);
        --card-bg: rgba(13, 22, 38, 0.7);
        --border-glow: rgba(16, 185, 129, 0.15);
        --text-color: #f3f4f6;
        --font-sans: 'Outfit', sans-serif;
        --font-mono: 'Fira Code', monospace;
      }
      
      html, body {
        margin: 0;
        min-height: 100%;
        background-color: var(--bg-dark);
        background-image: var(--bg-radial);
        color: var(--text-color);
        font-family: var(--font-sans);
        overflow-x: hidden;
      }
      
      body {
        min-height: 100svh;
        padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        display: grid;
        place-items: center;
      }
      
      main {
        width: 100%;
        max-width: 600px;
        min-height: calc(100svh - 32px);
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 16px;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        background: var(--card-bg);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      
      h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #34d399, #059669);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-bottom: 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      .badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      
      .pill {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: #e5e7eb;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      
      button.pill {
        min-height: auto;
        cursor: pointer;
        background: rgba(16, 185, 129, 0.1);
        border-color: rgba(16, 185, 129, 0.2);
        color: #34d399;
      }
      
      button.pill:hover {
        background: rgba(16, 185, 129, 0.2);
        border-color: rgba(16, 185, 129, 0.4);
        box-shadow: 0 0 12px rgba(16, 185, 129, 0.2);
      }
      
      .pill.ok {
        color: #34d399;
        border-color: rgba(52, 211, 153, 0.2);
        background: rgba(52, 211, 153, 0.08);
        box-shadow: 0 0 10px rgba(52, 211, 153, 0.05);
      }
      
      .pill.bad {
        color: #f87171;
        border-color: rgba(248, 113, 113, 0.2);
        background: rgba(248, 113, 113, 0.08);
        box-shadow: 0 0 10px rgba(248, 113, 113, 0.05);
      }
      
      .pill.warn {
        color: #fbbf24;
        border-color: rgba(251, 191, 36, 0.2);
        background: rgba(251, 191, 36, 0.08);
        box-shadow: 0 0 10px rgba(251, 191, 36, 0.05);
      }
      
      .card {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 20px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(255, 255, 255, 0.02);
      }
      
      label {
        display: block;
        margin-bottom: 2px;
        color: #34d399;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      
      input, select {
        width: 100%;
        height: 52px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.3);
        color: #fff;
        padding: 0 16px;
        outline: none;
        font-family: var(--font-sans);
        font-size: 16px;
        font-weight: 500;
      }
      
      input#uid {
        font-family: var(--font-mono);
        font-size: 22px;
        font-weight: 600;
        text-align: center;
        letter-spacing: 2px;
      }
      
      input:focus, select:focus {
        border-color: #10b981;
        background: rgba(0, 0, 0, 0.45);
        box-shadow: 0 0 14px rgba(16, 185, 129, 0.15);
      }
      
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      
      .actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      
      button {
        min-height: 50px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: #e5e7eb;
        font-family: var(--font-sans);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      
      button:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-1px);
      }
      
      button:active {
        transform: translateY(1px);
      }
      
      button.primary {
        background: linear-gradient(135deg, #10b981, #059669);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 4px 16px rgba(16, 185, 129, 0.2);
      }
      
      button.primary:hover {
        background: linear-gradient(135deg, #34d399, #059669);
        box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
      }
      
      button.active {
        border-color: transparent;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: #fff;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
      }
      
      .lokets {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
      }
      
      .lokets button {
        min-height: 44px;
        padding: 0;
        font-size: 16px;
      }
      
      .result {
        min-height: 0;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
      }
      
      .status {
        padding: 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.02);
        font-weight: 700;
        font-size: 14px;
        text-align: center;
        letter-spacing: 0.3px;
      }
      
      .status.ok {
        color: #34d399;
        border-color: rgba(52, 211, 153, 0.2);
        background: rgba(52, 211, 153, 0.06);
      }
      
      .status.warn {
        color: #fbbf24;
        border-color: rgba(251, 191, 36, 0.2);
        background: rgba(251, 191, 36, 0.06);
      }
      
      .status.bad {
        color: #f87171;
        border-color: rgba(248, 113, 113, 0.2);
        background: rgba(248, 113, 113, 0.06);
      }
      
      pre {
        min-height: 120px;
        overflow: auto;
        margin: 0;
        padding: 16px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(0, 0, 0, 0.4);
        color: #a7f3d0;
        white-space: pre-wrap;
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1.5;
      }
      
      .foot {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      .muted {
        color: var(--text-secondary);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      
      .modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        animation: fadeIn 0.2s ease-out;
      }
      
      .modal[hidden] {
        display: none;
      }
      
      .modal form {
        width: min(440px, 100%);
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        background: #0d1424;
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
        animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      
      @media (max-width: 520px) {
        body { padding: 12px; }
        main { min-height: calc(100svh - 24px); padding: 18px; gap: 12px; }
        .grid { grid-template-columns: 1fr; }
        .actions { grid-template-columns: 1fr; }
        .lokets { grid-template-columns: repeat(3, 1fr); }
      }
      
      @media (orientation: landscape) and (max-height: 520px) {
        main { grid-template-columns: 300px 1fr; grid-template-rows: auto 1fr auto; }
        .top, .foot { grid-column: 1 / -1; }
        .card { align-self: start; }
      }

      .top { justify-content: center; position: relative; border-bottom: 0; padding-bottom: 4px; }
      .top h1, .badges span { display: none; }
      .brand-logo { width: 176px; max-width: 62vw; height: auto; filter: drop-shadow(0 18px 36px rgba(16,185,129,.25)); }
      main { max-width: 440px; grid-template-rows: auto auto 1fr auto; }
      .card { border: 0; background: transparent; padding: 0; }
      .scan-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
      .mode-toggle {
        width: 136px; height: 52px; border-radius: 999px; padding: 4px;
        display: grid; grid-template-columns: 1fr 1fr; position: relative; background: rgba(0,0,0,.28);
      }
      .mode-toggle::before {
        content: ""; position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px);
        border-radius: 999px; background: #10b981; transition: transform .18s ease;
      }
      .mode-toggle.nfc::before { transform: translateX(100%); }
      .mode-toggle span { z-index: 1; display: grid; place-items: center; font-size: 12px; font-weight: 850; }
      .result { grid-template-rows: auto auto; }
      #result-summary { min-height: 120px; display: grid; place-items: center; text-align: center; color: #d1fae5; font-size: 18px; font-weight: 750; }
      #result-image { width: 100%; max-height: 280px; object-fit: contain; border-radius: 16px; background: rgba(0,0,0,.25); }
      #debug-output { max-height: 180px; min-height: 80px; }
      .settings-status { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
      .settings-section { margin-top: 14px; }
      :root {
        --bg-dark: #050505;
        --bg-radial: none;
        --card-bg: #0b0b0b;
        --text-color: #f5f5f5;
        --text-secondary: #a3a3a3;
      }
      body { background: #050505; }
      main {
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        border-color: #222;
        border-radius: 18px;
        background: #0b0b0b;
        box-shadow: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }
      .brand-logo { width: 168px; filter: none; cursor: pointer; }
      button:hover {
        transform: none;
        background: #171717;
        border-color: #444;
        box-shadow: none;
      }
      .card { gap: 12px; }
      label {
        color: #f5f5f5;
        text-align: left;
        letter-spacing: .08em;
      }
      label[for="uid"] { text-align: center; }
      input, select {
        border-color: #333;
        border-radius: 10px;
        background: #050505;
        box-shadow: none;
      }
      input:focus, select:focus {
        border-color: #f5f5f5;
        background: #050505;
        box-shadow: none;
      }
      input#uid {
        height: 58px;
        font-size: 24px;
      }
      .scan-row {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .mode-toggle {
        width: 100%;
        height: 56px;
        border-radius: 10px;
        border-color: #333;
        background: #050505;
        box-shadow: none;
      }
      .mode-toggle::before {
        border-radius: 8px;
        background: #f5f5f5;
      }
      .mode-toggle span { color: #f5f5f5; }
      .mode-toggle:not(.nfc) span:first-child,
      .mode-toggle.nfc span:last-child {
        color: #050505;
      }
      #send,
      button.primary {
        width: 100%;
        min-height: 56px;
        border-color: #f5f5f5;
        border-radius: 10px;
        background: #f5f5f5;
        color: #050505;
        box-shadow: none;
      }
      #send:hover,
      button.primary:hover {
        background: #e5e5e5;
        box-shadow: none;
      }
      .foot { display: none; }
      .status,
      #result-summary,
      pre {
        border-color: #222;
        background: #050505;
        color: #f5f5f5;
        box-shadow: none;
      }
      .status.ok, .status.warn, .status.bad {
        border-color: #333;
        background: #050505;
        color: #f5f5f5;
      }
      .pill,
      button.pill,
      .pill.ok,
      .pill.warn,
      .pill.bad {
        border-color: #333;
        background: #111;
        color: #f5f5f5;
        box-shadow: none;
      }
      .settings-status {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin: 0 0 16px;
      }
      .settings-status .pill {
        width: 100%;
        justify-content: flex-start;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 10px;
        text-align: left;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .settings-status .pill::before {
        content: "";
        width: 8px;
        height: 8px;
        flex: 0 0 8px;
        border-radius: 999px;
        background: #a3a3a3;
      }
      .settings-status .pill.ok::before { background: #f5f5f5; }
      .settings-status .pill.warn::before { background: #a3a3a3; }
      .settings-status .pill.bad::before { background: #525252; }
      #install { width: 100%; }
      .modal { background: rgba(0, 0, 0, .82); }
      .modal form {
        border-color: #333;
        border-radius: 16px;
        background: #0b0b0b;
        box-shadow: none;
      }
      .actions { grid-template-columns: 1fr 1fr; }

      /* Frontend v2: flat kiosk surface, backend flow unchanged. */
      * { transition: none; }
      html, body {
        background: #f4f4f2;
        color: #111;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

        padding: 0;

      }

      }

      }

      :root {
        --page: #f4f4f2;
        --surface: #fff;
        --text: #111;
        --line: #111;
        --primary: #111;
        --primary-text: #fff;
        --hover: #eee;
        --placeholder: #777;
        --modal-bg: rgba(244, 244, 242, .92);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --page: #080808;
          --surface: #111;
          --text: #f5f5f5;
          --line: #f5f5f5;
          --primary: #f5f5f5;
          --primary-text: #080808;
          --hover: #1f1f1f;
          --placeholder: #bdbdbd;
          --modal-bg: rgba(0, 0, 0, .88);
        }
      }
      html, body, main {
        background: var(--page);
        color: var(--text);
      }
      label,
      .mode-toggle span,
      .status,
      #result-summary,
      .pill,
      button.pill,
      .pill.ok,
      .pill.warn,
      .pill.bad,
      pre {
        color: var(--text);
      }
      input,
      select,
      button,
      .mode-toggle,
      .status,
      #result-summary,
      #result-image,
      .pill,
      button.pill,
      .pill.ok,
      .pill.warn,
      .pill.bad,
      pre {
        border-color: var(--line);
        background: var(--surface);
      }
      input,
      select {
        color: var(--text);
      }
      input::placeholder {
        color: var(--placeholder);
        opacity: 1;
      }
      input:focus,
      select:focus {
        border-color: var(--line);
        outline-color: var(--line);
      }
      button:hover {
        background: var(--hover);
        border-color: var(--line);
      }
      #send,
      button.primary,
      .mode-toggle::before,
      .settings-status .pill::before,
      .settings-status .pill.ok::before,
      .settings-status .pill.warn::before,
      .settings-status .pill.bad::before {
        border-color: var(--primary);
        background: var(--primary);
        color: var(--primary-text);
      }
      #send:hover,
      button.primary:hover {
        background: var(--primary);
      }
      .mode-toggle:not(.nfc) span:first-child,
      .mode-toggle.nfc span:last-child {
        color: var(--primary-text);
      }
      .modal {
        background: var(--modal-bg);
      }
      .modal form {
        border-color: var(--line);
        background: var(--page);
        color: var(--text);
      }
      @media (min-width: 760px) and (orientation: landscape), (min-width: 900px) {
        main {
          display: grid;
          grid-template-columns: minmax(320px, 480px) minmax(360px, 1fr);
          grid-template-rows: auto auto;
          column-gap: clamp(28px, 6vw, 96px);
          row-gap: 18px;
          align-content: center;
          align-items: center;
        }
        .top,
        .card {
          width: 100%;
          max-width: 480px;
          margin: 0;
        }
        .top {
          min-height: 0;
          align-self: end;
        }
        .brand-logo {
          width: min(240px, 28vw);
        }
        .card {
          align-self: start;
        }
        .result {
          grid-column: 2;
          grid-row: 1 / span 2;
          width: 100%;
          height: 100%;
          margin: 0;
          align-self: stretch;
          align-content: center;
        }
        #result-summary {
          min-height: min(42svh, 360px);
        }
      }
      @media (min-width: 760px) and (orientation: landscape) and (max-height: 520px) {
        main {
          grid-template-columns: minmax(280px, 420px) minmax(320px, 1fr);
          grid-template-rows: 1fr;
          column-gap: clamp(18px, 4vw, 48px);
          padding: 14px 24px;
        }
        .top,
        .card {
          grid-column: 1;
          grid-row: 1;
        }
        .top {
          align-self: start;
        }
        .card {
          align-self: end;
        }
        .brand-logo {
          width: min(112px, 15vw);
        }
        .card {
          gap: 10px;
        }
        input,
        select,
        .mode-toggle {
          height: 48px;
        }
        #send,
        button.primary {
          min-height: 52px;
        }
        #result-summary {
          min-height: 170px;
          font-size: clamp(22px, 4vw, 34px);
        }
        .result {
          grid-row: 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="top">
        <h1>MeRS Remote</h1>
        <img class="brand-logo" src="mers-logo.png" alt="">
      </div>

      <section class="card">
        <label for="uid">ID kartu / GEN</label>
        <input id="uid" inputmode="numeric" autocomplete="off" maxlength="10" placeholder="1696235068">
        <div class="scan-row" style="margin-top:10px">
          <button id="scan-mode" class="mode-toggle" type="button" aria-pressed="false"><span>Manual</span><span>NFC</span></button>
          <button id="send" class="primary">Kirim</button>
        </div>
      </section>

      <section class="result">
        <div id="status" class="status">Siap.</div>
        <div id="result-summary">Belum ada response.</div>
        <img id="result-image" alt="" hidden>
      </section>

      <div class="foot">
        <div id="note" class="muted">Web NFC butuh Android Chrome + HTTPS.</div>
      </div>
    </main>

    <div id="config" class="modal" hidden>
      <form>
        <div class="settings-status">
          <span id="web-status" class="pill warn">web...</span>
          <span id="bridge-status" class="pill warn">bridge...</span>
          <span id="mers-status" class="pill warn">mers...</span>
          <span id="conn" class="pill bad">ws offline</span>
        </div>
        <div class="settings-section">
          <label for="action">Mode kirim</label>
          <select id="action">
            <option value="cek_pesanan">Cek Pesanan</option>
            <option value="tap_in">Tap In Scanner</option>
          </select>
        </div>
        <div class="lokets settings-section" id="lokets" style="display:none">
          <button type="button" data-loket="1">1</button><button type="button" data-loket="2">2</button><button type="button" data-loket="3">3</button>
          <button type="button" data-loket="4">4</button><button type="button" data-loket="5">5</button><button type="button" data-loket="6">6</button>
        </div>
        <label for="ws">WebSocket Gateway</label>
        <input id="ws" placeholder="https://makan.endrisusanto.my.id/">
        <div class="presets" style="margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap;">
          <button type="button" class="pill" id="preset-auto" style="min-height: auto; padding: 4px 8px; font-size: 11px; margin: 0;">Auto (Host)</button>
          <button type="button" class="pill" id="preset-prod" style="min-height: auto; padding: 4px 8px; font-size: 11px; margin: 0;">Cloud</button>
          <button type="button" class="pill" id="preset-local3" style="min-height: auto; padding: 4px 8px; font-size: 11px; margin: 0;">Local 3000</button>
          <button type="button" class="pill" id="preset-local5" style="min-height: auto; padding: 4px 8px; font-size: 11px; margin: 0;">Local 3005</button>
        </div>
        <button id="install" type="button" class="settings-section" hidden>Install PWA</button>
        <label for="device" style="margin-top:10px">Device / Room</label>
        <input id="device" placeholder="loket-pc-1">
        <div class="settings-section">
          <label>Debug</label>
          <pre id="debug-output">Belum ada response.</pre>
        </div>
        <div class="actions" style="margin-top:14px">
          <button id="cancel-settings" type="button">Batal</button>
          <button id="save" type="button" class="primary">Simpan</button>
        </div>
      </form>
    </div>

    <script>
      const $ = id => document.getElementById(id);
      const DEFAULT_URL = 'https://makan.endrisusanto.my.id/';
      const DEFAULT_WS = 'wss://makan.endrisusanto.my.id';
      const savedWsUrl = localStorage.mersWsUrl || '';
      const legacyWsUrl = location.protocol === 'https:' ? `wss://${location.host}/ws` : `ws://${location.host}/ws`;
      if (savedWsUrl === legacyWsUrl) localStorage.removeItem('mersWsUrl');
      if (savedWsUrl === 'wss://mers.endrisusanto.my.id/ws' || savedWsUrl === DEFAULT_WS || savedWsUrl === 'wss://makan.endrisusanto.my.id/ws') localStorage.removeItem('mersWsUrl');
      function toWsUrl(value) {
        if (!value) return '';
        try {
          const url = new URL(value);
          if (url.protocol === 'https:') url.protocol = 'wss:';
          if (url.protocol === 'http:') url.protocol = 'ws:';
          return url.toString();
        } catch {
          return value;
        }
      }
      const defaultWsUrl = location.protocol.startsWith('http') ? (location.protocol === 'https:' ? `wss://${location.host}/ws` : `ws://${location.host}/ws`) : DEFAULT_WS;
      const state = {
        ws: null,
        reconnectTimer: null,
        retryMs: 2500,
        loket: '1',
        inputMode: 'manual',
        config: {
          url: localStorage.mersWsUrl || defaultWsUrl,
          device: localStorage.mersDevice || 'loket-pc-1',
        },
      };

      function setStatus(text, kind = '') {
        $('status').textContent = text;
        $('status').className = `status ${kind}`;
      }

      function setDebug(value) {
        $('debug-output').textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
      }

      function isTauriApp() {
        return Boolean(window.__TAURI__ || window.__TAURI_INTERNALS__);
      }

      function responseText(data) {
        return data?.message || data?.tap?.message || data?.status || (data?.success === false ? 'Gagal.' : data?.success ? 'Berhasil.' : 'Response diterima.');
      }

      function imageSrcFrom(value) {
        if (typeof value === 'string') {
          const img = value.match(/<img[^>]+src=["']([^"']+)["']/i)?.[1] || value;
          if (/^data:image\//i.test(img) || /^https?:\/\/.+\.(png|jpe?g|webp|gif)(\?.*)?$/i.test(img)) return img;
          if (/^\/.+\.(png|jpe?g|webp|gif)(\?.*)?$/i.test(img)) return `http://107.102.8.148${img}`;
          if (/^[\w./-]+\.(png|jpe?g|webp|gif)(\?.*)?$/i.test(img)) return `http://107.102.8.148/MERS/${img.replace(/^\/+/, '')}`;
          return '';
        }
        if (!value || typeof value !== 'object') return '';
        for (const [key, item] of Object.entries(value)) {
          if (/foto|photo|image|gambar|avatar|picture/i.test(key)) {
            const src = imageSrcFrom(item);
            if (src) return src;
          }
        }
        for (const item of Object.values(value)) {
          const src = imageSrcFrom(item);
          if (src) return src;
        }
        return '';
      }

      function renderResponse(data) {
        const text = responseText(data);
        const lower = text.toLowerCase();
        const kind = lower.includes('tidak pesan') || lower.includes('unplan') ? 'warn' : data?.success === false ? 'bad' : 'ok';
        setStatus(text, kind);
        $('result-summary').textContent = text;
        setDebug(data);
        const image = isTauriApp() ? imageSrcFrom(data) : '';
        $('result-image').hidden = !image;
        if (image) $('result-image').src = image;
      }

      function setConn(state) {
        $('conn').textContent = `ws ${state}`;
        $('conn').className = `pill ${state === 'online' ? 'ok' : state === 'connecting' ? 'warn' : 'bad'}`;
      }

      function setBadge(id, text, kind) {
        $(id).textContent = text;
        $(id).className = `pill ${kind}`;
      }

      async function checkStatuses() {
        setBadge('web-status', 'web online', 'ok');
        setBadge('bridge-status', window.AndroidNfc ? 'bridge android' : window.__TAURI__ ? 'bridge tauri' : 'bridge web', window.AndroidNfc || window.__TAURI__ ? 'ok' : 'warn');
        let timer;
        try {
          const controller = new AbortController();
          timer = setTimeout(() => controller.abort(), 3500);
          const res = await fetch('/mers-ping', { method: 'HEAD', cache: 'no-store', signal: controller.signal });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          setBadge('mers-status', 'mers online', 'ok');
        } catch {
          setBadge('mers-status', 'mers offline', 'bad');
        } finally {
          clearTimeout(timer);
        }
      }

      function disconnect() {
        clearTimeout(state.reconnectTimer);
        state.reconnectTimer = null;
        const ws = state.ws;
        state.ws = null;
        if (ws) ws.onclose = null;
        if (ws && ws.readyState < WebSocket.CLOSING) ws.close();
      }

      function connect() {
        disconnect();
        if (!state.config.url) {
          setConn('offline');
          setStatus('WebSocket belum diatur. Buka Server untuk mengaktifkan.', 'warn');
          return;
        }
        setConn('connecting');
        try {
          state.ws = new WebSocket(state.config.url);
          state.ws.onopen = () => {
            state.retryMs = 2500;
            setConn('online');
            state.ws.send(JSON.stringify({ type: 'join', role: 'mobile', device: state.config.device }));
          };
          state.ws.onclose = () => {
            setConn('offline');
            clearTimeout(state.reconnectTimer);
            state.reconnectTimer = setTimeout(connect, state.retryMs);
            state.retryMs = Math.min(state.retryMs * 2, 30000);
          };
          state.ws.onerror = () => setConn('offline');
          state.ws.onmessage = event => {
            const data = JSON.parse(event.data);
            renderResponse(data);
          };
        } catch (error) {
          setConn('offline');
          setStatus(String(error), 'bad');
        }
      }

      function uid() {
        $('uid').value = $('uid').value.replace(/\D/g, '').slice(0, 10);
        if (/^\d{8,10}$/.test($('uid').value)) return $('uid').value;
        setStatus('ID harus 8-10 digit angka.', 'bad');
        return '';
      }

      function hexToDecimal(hex) {
        return BigInt(`0x${hex}`).toString();
      }

      function reverseHexBytes(hex) {
        const raw = hex.length % 2 ? `0${hex}` : hex;
        return raw.match(/../g).reverse().join('');
      }

      function send() {
        const value = uid();
        if (!value) return;
        const message = { type: 'command', device: state.config.device, action: $('action').value, uid: value, loket: state.loket };
        if (state.ws?.readyState === WebSocket.OPEN) {
          state.ws.send(JSON.stringify(message));
          setStatus('Terkirim.', 'ok');
          $('result-summary').textContent = 'Terkirim.';
        } else if (state.config.url) {
          setStatus('WebSocket belum online.', 'bad');
        } else {
          setStatus('Atur WebSocket dulu dari menu Server.', 'warn');
        }
        setDebug(message);
      }

      function setInputMode(mode) {
        state.inputMode = mode;
        $('scan-mode').classList.toggle('nfc', mode === 'nfc');
        $('scan-mode').setAttribute('aria-pressed', String(mode === 'nfc'));
        $('uid').readOnly = mode === 'nfc';
        if (mode === 'nfc') scanNfc();
        else { $('uid').readOnly = false; $('uid').focus(); }
      }

      async function scanNfc() {
        if (window.AndroidNfc) {
          window.AndroidNfc.requestScan();
          setStatus('Tempelkan kartu NFC.', 'warn');
          return;
        }
        if (!('NDEFReader' in window)) {
          setStatus('Web NFC tidak didukung browser ini.', 'bad');
          return;
        }
        try {
          const reader = new NDEFReader();
          await reader.scan();
          setStatus('Tempelkan kartu NFC.', 'warn');
          reader.onreading = event => {
            const serial = (event.serialNumber || '').replace(/:/g, '').toUpperCase();
            const uidHex = reverseHexBytes(serial);
            $('uid').value = hexToDecimal(uidHex);
            setStatus(`NFC terbaca: ${serial} -> ${uidHex}`, 'ok');
          };
        } catch (error) {
          setStatus(String(error), 'bad');
        }
      }

      $('uid').addEventListener('input', uid);
      $('send').addEventListener('click', send);
      $('scan-mode').addEventListener('click', () => setInputMode(state.inputMode === 'manual' ? 'nfc' : 'manual'));
      $('action').addEventListener('change', () => { $('lokets').style.display = $('action').value === 'tap_in' ? 'grid' : 'none'; });
      document.querySelectorAll('[data-loket]').forEach(button => button.addEventListener('click', () => {
        state.loket = button.dataset.loket;
        document.querySelectorAll('[data-loket]').forEach(item => item.classList.toggle('active', item === button));
      }));
      document.querySelector('[data-loket="1"]').classList.add('active');

      function openSettings() {
        $('ws').value = localStorage.mersWsUrl || (location.protocol.startsWith('http') ? location.origin + '/' : DEFAULT_URL);
        $('ws').placeholder = DEFAULT_URL;
        $('device').value = state.config.device;
        $('config').hidden = false;
      }
      let logoClicks = 0;
      let logoClickTimer = null;
      document.querySelector('.brand-logo').addEventListener('click', () => {
        logoClicks += 1;
        clearTimeout(logoClickTimer);
        if (logoClicks >= 3) {
          logoClicks = 0;
          openSettings();
          return;
        }
        logoClickTimer = setTimeout(() => { logoClicks = 0; }, 1200);
      });
      $('cancel-settings').addEventListener('click', () => { $('config').hidden = true; });
      $('save').addEventListener('click', () => {
        state.config.url = toWsUrl($('ws').value.trim());
        state.config.device = $('device').value.trim() || 'loket-pc-1';
        localStorage.mersDevice = state.config.device;
        $('config').hidden = true;
        if (state.config.url) {
          localStorage.mersWsUrl = state.config.url;
          connect();
        } else {
          localStorage.removeItem('mersWsUrl');
          disconnect();
          setConn('offline');
          setStatus('WebSocket dimatikan.', 'warn');
        }
      });

      let installPrompt = null;
      window.addEventListener('beforeinstallprompt', event => {
        event.preventDefault();
        installPrompt = event;
        $('install').hidden = false;
      });
      $('install').addEventListener('click', () => installPrompt?.prompt());

      $('preset-auto').addEventListener('click', () => {
        $('ws').value = location.protocol.startsWith('http') ? location.origin + '/' : DEFAULT_URL;
      });
      $('preset-prod').addEventListener('click', () => {
        $('ws').value = DEFAULT_URL;
      });
      $('preset-local3').addEventListener('click', () => {
        $('ws').value = 'http://localhost:3000/';
      });
      $('preset-local5').addEventListener('click', () => {
        $('ws').value = 'http://localhost:3005/';
      });

      if (location.protocol === 'http:' || location.protocol === 'https:') navigator.serviceWorker?.register('sw.js').catch(() => {});
      checkStatuses();
      setInterval(checkStatuses, 15000);
      if (state.config.url) connect();
      else setStatus('WebSocket belum diatur. Buka Server untuk mengaktifkan.', 'warn');
    </script>
  </body>
</html>
