<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#059669">
    <title>MeRS Remote</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; background: #ecfdf5; color: #1f2937; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { min-height: 100svh; padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left)); display: grid; place-items: stretch; background: linear-gradient(135deg, #ecfdf5, #dbeafe); }
      main { min-height: calc(100svh - 20px); display: grid; grid-template-rows: auto auto 1fr auto; gap: 10px; padding: 10px; border: 1px solid #a7f3d0; border-radius: 18px; background: rgba(255,255,255,.86); box-shadow: 0 18px 48px rgba(15,118,110,.18); backdrop-filter: blur(10px); }
      h1 { margin: 0; font-size: 24px; line-height: 1; }
      .top { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px; border-radius: 16px; color: #fff; background: linear-gradient(90deg, #10b981, #059669); box-shadow: 0 10px 24px rgba(5,150,105,.24); }
      .badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
      .pill { padding: 7px 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,.55); background: rgba(255,255,255,.22); color: #fff; font-size: 12px; font-weight: 800; }
      button.pill { min-height: auto; cursor: pointer; }
      .pill.ok { color: #065f46; border-color: #6ee7b7; background: #d1fae5; }
      .pill.bad { color: #991b1b; border-color: #fecaca; background: #fee2e2; }
      .pill.warn { color: #92400e; border-color: #fde68a; background: #fef3c7; }
      .card { padding: 12px; border-radius: 14px; border: 1px solid #a7f3d0; background: #fff; box-shadow: 0 8px 20px rgba(15,23,42,.07); }
      label { display: block; margin-bottom: 6px; color: #047857; font-size: 12px; font-weight: 900; text-transform: uppercase; }
      input, select { width: 100%; height: 46px; border-radius: 12px; border: 1px solid #cbd5e1; background: #f8fafc; color: #0f172a; padding: 0 12px; outline: none; font: 800 20px ui-monospace, Consolas, monospace; }
      input:focus, select:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,.18); }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
      button { min-height: 48px; border-radius: 12px; border: 1px solid #a7f3d0; background: #ecfdf5; color: #065f46; font-weight: 900; cursor: pointer; }
      button:active { transform: translateY(1px); }
      button.primary { background: #059669; color: #fff; border-color: #059669; }
      button.active { border-color: #059669; background: #10b981; color: #fff; }
      .lokets { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
      .lokets button { min-height: 40px; padding: 0; }
      .result { min-height: 0; overflow: hidden; display: grid; grid-template-rows: auto 1fr; gap: 10px; }
      .status { padding: 12px; border-radius: 14px; border: 1px solid #cbd5e1; background: #f8fafc; font-weight: 900; text-align: center; }
      .status.ok { color: #065f46; border-color: #6ee7b7; background: #d1fae5; }
      .status.warn { color: #92400e; border-color: #fcd34d; background: #fef3c7; }
      .status.bad { color: #991b1b; border-color: #fca5a5; background: #fee2e2; }
      pre { min-height: 0; overflow: auto; margin: 0; padding: 12px; border-radius: 14px; border: 1px solid #a7f3d0; background: #ecfdf5; color: #064e3b; white-space: pre-wrap; font: 12px ui-monospace, Consolas, monospace; }
      .foot { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
      .muted { color: #64748b; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .modal { position: fixed; inset: 0; z-index: 10; display: grid; place-items: center; padding: 12px; background: rgba(0,0,0,.72); }
      .modal[hidden] { display: none; }
      .modal form { width: min(420px, 100%); padding: 16px; border: 1px solid #a7f3d0; border-radius: 16px; color: #1f2937; background: #fff; }
      @media (max-width: 520px) {
        body { padding: 6px; }
        main { min-height: calc(100svh - 12px); padding: 10px; }
        .grid, .actions { grid-template-columns: 1fr; }
        .lokets { grid-template-columns: repeat(3, 1fr); }
      }
      @media (orientation: landscape) and (max-height: 520px) {
        main { grid-template-columns: 330px 1fr; grid-template-rows: auto 1fr auto; }
        .top, .foot { grid-column: 1 / -1; }
        .card { align-self: start; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="top">
        <h1>MeRS Remote</h1>
        <div class="badges">
          <span id="web-status" class="pill warn">web...</span>
          <span id="bridge-status" class="pill warn">bridge...</span>
          <span id="mers-status" class="pill warn">mers...</span>
          <span id="conn" class="pill bad">ws offline</span>
          <button id="settings-top" class="pill" type="button">Server</button>
        </div>
      </div>

      <section class="card">
        <label for="uid">ID kartu / GEN</label>
        <input id="uid" inputmode="numeric" autocomplete="off" maxlength="10" placeholder="1696235068">
        <div class="grid" style="margin-top:10px">
          <select id="action">
            <option value="cek_pesanan">Cek Pesanan</option>
            <option value="tap_in">Tap In Scanner</option>
          </select>
          <button id="scan">Scan NFC</button>
        </div>
        <div class="lokets" id="lokets" style="margin-top:10px; display:none">
          <button data-loket="1">1</button><button data-loket="2">2</button><button data-loket="3">3</button>
          <button data-loket="4">4</button><button data-loket="5">5</button><button data-loket="6">6</button>
        </div>
        <div class="actions" style="margin-top:10px">
          <button id="send" class="primary">Kirim</button>
          <button id="clear">Clear</button>
          <button id="settings">Server</button>
        </div>
      </section>

      <section class="result">
        <div id="status" class="status">Siap.</div>
        <pre id="output">Belum ada response.</pre>
      </section>

      <div class="foot">
        <div id="note" class="muted">Web NFC butuh Android Chrome + HTTPS.</div>
        <button id="install" hidden>Install</button>
      </div>
    </main>

    <div id="config" class="modal" hidden>
      <form>
        <label for="ws">WebSocket Gateway</label>
        <input id="ws" placeholder="https://makan.endrisusanto.my.id/">
        <label for="device" style="margin-top:10px">Device / Room</label>
        <input id="device" placeholder="loket-pc-1">
        <div class="actions" style="margin-top:14px">
          <button id="cancel-settings" type="button">Batal</button>
          <button id="save" type="button" class="primary">Simpan</button>
        </div>
      </form>
    </div>

    <script>
      const $ = id => document.getElementById(id);
      const DEFAULT_URL = 'https://makan.endrisusanto.my.id/';
      const DEFAULT_WS = 'wss://makan.endrisusanto.my.id/ws';
      const savedWsUrl = localStorage.mersWsUrl || '';
      const legacyWsUrl = location.protocol === 'https:' ? `wss://${location.host}/ws` : `ws://${location.host}/ws`;
      if (savedWsUrl === legacyWsUrl) localStorage.removeItem('mersWsUrl');
      if (savedWsUrl === 'wss://mers.endrisusanto.my.id/ws' || savedWsUrl === DEFAULT_WS) localStorage.removeItem('mersWsUrl');
      function toWsUrl(value) {
        if (!value) return '';
        try {
          const url = new URL(value);
          if (url.protocol === 'https:') url.protocol = 'wss:';
          if (url.protocol === 'http:') url.protocol = 'ws:';
          if (url.pathname === '/') url.pathname = '/ws';
          return url.toString();
        } catch {
          return value;
        }
      }
      const state = {
        ws: null,
        reconnectTimer: null,
        retryMs: 2500,
        loket: '1',
        config: {
          url: localStorage.mersWsUrl || '',
          device: localStorage.mersDevice || 'loket-pc-1',
        },
      };

      function setStatus(text, kind = '') {
        $('status').textContent = text;
        $('status').className = `status ${kind}`;
      }

      function setConn(state) {
        $('conn').textContent = `ws ${state}`;
        $('conn').className = `pill ${state === 'online' ? 'ok' : state === 'connecting' ? 'warn' : 'bad'}`;
      }

      function setBadge(id, text, kind) {
        $(id).textContent = text;
        $(id).className = `pill ${kind}`;
      }

      async function checkStatuses() {
        setBadge('web-status', 'web online', 'ok');
        setBadge('bridge-status', window.AndroidNfc ? 'bridge android' : window.__TAURI__ ? 'bridge tauri' : 'bridge web', window.AndroidNfc || window.__TAURI__ ? 'ok' : 'warn');
        let timer;
        try {
          const controller = new AbortController();
          timer = setTimeout(() => controller.abort(), 3500);
          const res = await fetch('/mers-ping', { method: 'HEAD', cache: 'no-store', signal: controller.signal });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          setBadge('mers-status', 'mers online', 'ok');
        } catch {
          setBadge('mers-status', 'mers offline', 'bad');
        } finally {
          clearTimeout(timer);
        }
      }

      function disconnect() {
        clearTimeout(state.reconnectTimer);
        state.reconnectTimer = null;
        const ws = state.ws;
        state.ws = null;
        if (ws) ws.onclose = null;
        if (ws && ws.readyState < WebSocket.CLOSING) ws.close();
      }

      function connect() {
        disconnect();
        if (!state.config.url) {
          setConn('offline');
          setStatus('WebSocket belum diatur. Buka Server untuk mengaktifkan.', 'warn');
          return;
        }
        setConn('connecting');
        try {
          state.ws = new WebSocket(state.config.url);
          state.ws.onopen = () => {
            state.retryMs = 2500;
            setConn('online');
            state.ws.send(JSON.stringify({ type: 'join', role: 'mobile', device: state.config.device }));
          };
          state.ws.onclose = () => {
            setConn('offline');
            clearTimeout(state.reconnectTimer);
            state.reconnectTimer = setTimeout(connect, state.retryMs);
            state.retryMs = Math.min(state.retryMs * 2, 30000);
          };
          state.ws.onerror = () => setConn('offline');
          state.ws.onmessage = event => {
            const data = JSON.parse(event.data);
            const text = `${data.status || ''} ${data.message || ''}`.toLowerCase();
            const kind = text.includes('tidak pesan') || text.includes('unplan') ? 'warn' : data.success ? 'ok' : 'bad';
            setStatus(data.message || data.status || 'Response diterima.', kind);
            $('output').textContent = JSON.stringify(data, null, 2);
          };
        } catch (error) {
          setConn('offline');
          setStatus(String(error), 'bad');
        }
      }

      function uid() {
        $('uid').value = $('uid').value.replace(/\D/g, '').slice(0, 10);
        if (/^\d{8,10}$/.test($('uid').value)) return $('uid').value;
        setStatus('ID harus 8-10 digit angka.', 'bad');
        return '';
      }

      function hexToDecimal(hex) {
        return BigInt(`0x${hex}`).toString();
      }

      function send() {
        const value = uid();
        if (!value) return;
        const message = { type: 'command', device: state.config.device, action: $('action').value, uid: value, loket: state.loket };
        if (state.ws?.readyState === WebSocket.OPEN) {
          state.ws.send(JSON.stringify(message));
          setStatus('Terkirim.', 'ok');
        } else if (state.config.url) {
          setStatus('WebSocket belum online.', 'bad');
        } else {
          setStatus('Atur WebSocket dulu dari menu Server.', 'warn');
        }
        $('output').textContent = JSON.stringify(message, null, 2);
      }

      async function scanNfc() {
        if (window.AndroidNfc) {
          window.AndroidNfc.requestScan();
          setStatus('Tempelkan kartu NFC.', 'warn');
          return;
        }
        if (!('NDEFReader' in window)) {
          setStatus('Web NFC tidak didukung browser ini.', 'bad');
          return;
        }
        try {
          const reader = new NDEFReader();
          await reader.scan();
          setStatus('Tempelkan kartu NFC.', 'warn');
          reader.onreading = event => {
            const serial = (event.serialNumber || '').replace(/:/g, '').toUpperCase();
            $('uid').value = hexToDecimal(serial);
            setStatus(`NFC terbaca: ${serial}`, 'ok');
          };
        } catch (error) {
          setStatus(String(error), 'bad');
        }
      }

      $('uid').addEventListener('input', uid);
      $('send').addEventListener('click', send);
      $('clear').addEventListener('click', () => { $('uid').value = ''; $('output').textContent = 'Belum ada response.'; setStatus('Siap.'); });
      $('scan').addEventListener('click', scanNfc);
      $('action').addEventListener('change', () => { $('lokets').style.display = $('action').value === 'tap_in' ? 'grid' : 'none'; });
      document.querySelectorAll('[data-loket]').forEach(button => button.addEventListener('click', () => {
        state.loket = button.dataset.loket;
        document.querySelectorAll('[data-loket]').forEach(item => item.classList.toggle('active', item === button));
      }));
      document.querySelector('[data-loket="1"]').classList.add('active');

      function openSettings() {
        $('ws').value = localStorage.mersWsUrl ? state.config.url : '';
        $('ws').placeholder = DEFAULT_URL;
        $('device').value = state.config.device;
        $('config').hidden = false;
      }
      $('settings').addEventListener('click', openSettings);
      $('settings-top').addEventListener('click', openSettings);
      $('cancel-settings').addEventListener('click', () => { $('config').hidden = true; });
      $('save').addEventListener('click', () => {
        state.config.url = toWsUrl($('ws').value.trim());
        state.config.device = $('device').value.trim() || 'loket-pc-1';
        localStorage.mersDevice = state.config.device;
        $('config').hidden = true;
        if (state.config.url) {
          localStorage.mersWsUrl = state.config.url;
          connect();
        } else {
          localStorage.removeItem('mersWsUrl');
          disconnect();
          setConn('offline');
          setStatus('WebSocket dimatikan.', 'warn');
        }
      });

      let installPrompt = null;
      window.addEventListener('beforeinstallprompt', event => {
        event.preventDefault();
        installPrompt = event;
        $('install').hidden = false;
      });
      $('install').addEventListener('click', () => installPrompt?.prompt());

      if (location.protocol === 'http:' || location.protocol === 'https:') navigator.serviceWorker?.register('sw.js').catch(() => {});
      checkStatuses();
      setInterval(checkStatuses, 15000);
      if (state.config.url) connect();
      else setStatus('WebSocket belum diatur. Buka Server untuk mengaktifkan.', 'warn');
    </script>
  </body>
</html>
